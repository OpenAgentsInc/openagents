name: Agent Client Protocol conformance

on:
  pull_request:
    paths:
      - "packages/agent-client-protocol/**"
      - "packages/agent-stdio-transport/**"
      - "packages/agent-client-protocol-conformance/**"
      - ".github/workflows/acp-conformance.yml"
  push:
    branches: [main]
    paths:
      - "packages/agent-client-protocol/**"
      - "packages/agent-stdio-transport/**"
      - "packages/agent-client-protocol-conformance/**"
      - ".github/workflows/acp-conformance.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hermetic-wire-and-fault-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.13.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir packages/agent-client-protocol run check:generated
      - run: pnpm --dir packages/agent-client-protocol-conformance run typecheck
      - run: pnpm --dir packages/agent-client-protocol-conformance run test
      - run: pnpm --dir packages/agent-client-protocol-conformance run check:artifacts
      - name: Execute machine-readable compatibility and fault matrix
        run: |
          mkdir -p artifacts
          pnpm --dir packages/agent-client-protocol-conformance run report > artifacts/acp-executed-conformance.json
      - uses: actions/upload-artifact@v4
        with:
          name: acp-hermetic-conformance
          path: packages/agent-client-protocol-conformance/compatibility/*.json
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: acp-executed-conformance
          path: artifacts/acp-executed-conformance.json
          if-no-files-found: error
