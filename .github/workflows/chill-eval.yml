# Chill-eval PR-evidence loop (#6185).
#
# On a PR, diff-scope the changed paths to affected scenarios, run the qa-runner
# eval (FIXTURES by default — no network, no spend), and post a PR comment with
# the comparison table, the per-variant video (gh-attach'd embed when armed, else
# the in-eval relative ref), the distilled-test ref, and the /pro/evals/<id> link.
#
# HONESTY:
#   - Default path is mock/own-infra (fixtures). No real Khala/OpenRouter spend.
#   - The real-model path is gated behind `vars.CHILL_EVAL_ARMED == 'true'` and a
#     token cap; it is OFF unless the owner arms it.
#   - The composer exits non-zero on a real regression, so this check is RED on a
#     failing variant (no fake green). It is configurable as a required or
#     optional check via branch protection.

name: chill-eval

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: chill-eval-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  chill-eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --ignore-scripts

      # gh-attach is the ain3sh/gh-attach Go binary (web-upload path the REST API
      # lacks). It reads browser cookies for auth, which CI does NOT have, so we
      # install it but the eval composer falls back to the in-eval relative video
      # ref when the upload is unauthenticated (honest, no broken embed). Building
      # requires Go; install only when armed to keep the default path light.
      - name: Install gh-attach (armed only)
        if: ${{ vars.CHILL_EVAL_ARMED == 'true' }}
        run: |
          curl -fsSL https://github.com/ain3sh/gh-attach/releases/latest/download/install.sh \
            | sh -s -- --bin-dir "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Compute changed paths
        id: diff
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          changed=$(git diff --name-only "$base" "$head" | paste -sd, -)
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      # Run the diff-scoped eval and compose the PR comment body. Default is the
      # fixture path (no spend). When armed, pass --gh-attach so the composer
      # attempts the upload (still falls back honestly if unauthenticated).
      - name: Run chill-eval + compose comment
        id: eval
        continue-on-error: true
        env:
          # CI has no browser; gh-attach authenticates from this exported
          # github.com user-session secret so the video uploads + embeds inline
          # (else the composer falls back to a relative ref — honest, no fake embed).
          GH_ATTACH_USER_SESSION: ${{ secrets.GH_ATTACH_USER_SESSION }}
        run: |
          ARMED="${{ vars.CHILL_EVAL_ARMED }}"
          ATTACH_FLAG=""
          if [ "$ARMED" = "true" ]; then ATTACH_FLAG="--gh-attach"; fi
          set +e
          bun --cwd apps/qa-runner run src/pr-comment-run.ts \
            --changed "${{ steps.diff.outputs.changed }}" \
            --out ./runs/pr-eval \
            --comment-out ./pr-comment.md \
            --pro-base-url "https://openagents.com" \
            --repo "${{ github.repository }}" \
            $ATTACH_FLAG
          echo "eval_exit=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Post / update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('pr-comment.md', 'utf8')
            const marker = '<!-- openagents-chill-eval -->'
            const { owner, repo } = context.repo
            const issue_number = context.payload.pull_request.number
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            })
            const existing = comments.find(c => c.body && c.body.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              })
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              })
            }

      # Honest gate: fail the check when the eval reported a regression, so a
      # failing variant turns this check RED (no fake green). Mark the workflow
      # required or optional via branch protection as desired.
      - name: Honest pass/fail gate
        run: |
          if [ "${{ steps.eval.outputs.eval_exit }}" != "0" ]; then
            echo "chill-eval reported a regression (exit ${{ steps.eval.outputs.eval_exit }})."
            exit 1
          fi
          echo "chill-eval: all variants passed."
