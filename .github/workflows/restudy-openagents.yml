# SA-4 standing freshness: re-study the openagents study packet so it does not drift.
#
# The committed digest index (SA-1) pins the commit the study packet was generated
# against. This workflow keeps it current without churning on every commit:
#
#   - On push to main (CI-on-merge) and on a daily schedule, it runs the SA-4
#     re-study cadence. The cadence regenerates the artifact over the live tree
#     and rewrites the small committed index ONLY when the studied content has
#     actually drifted (corpus-manifest drift), then commits + pushes that index.
#   - Pure commit drift (HEAD moved, studied content identical) reports `fresh`
#     and produces no commit. The packet/graph blobs are never committed; they
#     stay regenerate-on-demand (the #5334 dual-format-churn lesson).
#   - A red verification correctness gate fails the job without writing, so a
#     broken tree never silently refreshes the studied substrate.
#
# manual `verdict` runs (workflow_dispatch) print the staleness signal SA-2/SA-3
# trust without writing anything.

name: restudy-openagents

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "cadence mode (verdict = read-only signal, ci = refresh + commit)"
        type: choice
        default: ci
        options: [verdict, ci]

concurrency:
  group: restudy-openagents
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  restudy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - run: bun install --frozen-lockfile

      - name: Configure neutral git identity
        run: |
          git config user.name "openagents-studybench"
          git config user.email "studybench@openagents.com"

      - name: Re-study cadence
        env:
          CADENCE_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'ci' }}
        run: |
          packages/probe/packages/runtime/scripts/restudy-openagents-cadence.sh "$CADENCE_MODE"
