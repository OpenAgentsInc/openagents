<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autopilot Desktop</title>
    <!-- CL-53: generated Tailwind v4 stylesheet for the @openagentsinc/autopilot-ui
         components (built by `bun run build:css`, copied to the view bundle). -->
    <link rel="stylesheet" href="views://autopilot-desktop/styles.css" />
    <style>
      :root { color-scheme: dark; }
      body { margin:0; font-family:-apple-system,system-ui,sans-serif; background:#0b0d12; color:#e6e9ef; min-height:100vh; }
      code { color:#7dd3fc; }

      /* CL-44/CL-53 sidebar shell layout */
      .app-shell { display:flex; min-height:100vh; }
      .sidebar { flex:0 0 240px; background:#0e1117; border-right:1px solid #1c2230; display:flex; flex-direction:column; padding:1rem .75rem; gap:.25rem; position:sticky; top:0; height:100vh; box-sizing:border-box; }
      .sidebar-header { padding:.4rem .5rem 1rem; border-bottom:1px solid #1c2230; margin-bottom:.5rem; }
      .sidebar-title { font-size:1.05rem; font-weight:700; }
      .sidebar-status { font-size:.75rem; font-family:ui-monospace,monospace; margin-top:.3rem; }
      .status-online { color:#5ee08a; }
      .status-offline { color:#8b93a7; }
      .coord-slot:empty { display:none; }
      .coord-slot { padding:.2rem .5rem .6rem; }
      .coord-toggle { font-family:monospace; padding:3px 10px; border:1px solid currentColor; background:transparent; cursor:pointer; color:inherit; border-radius:3px; }
      .coord-toggle.coord-paused { border-color:#ffb454; }
      .nav-item { display:flex; align-items:center; justify-content:space-between; gap:.5rem; width:100%; text-align:left; font:inherit; font-size:.92rem; color:#cdd3e0; background:transparent; border:none; border-radius:.4rem; padding:.5rem .6rem; cursor:pointer; }
      .nav-item:hover { background:#161b25; }
      .nav-item.active { background:#1c2230; color:#7dd3fc; font-weight:600; }
      .nav-badge { background:#ff6b6b; color:#0b0d12; font-size:.7rem; font-weight:700; border-radius:.6rem; padding:.05rem .4rem; }
      .content { flex:1 1 auto; overflow-y:auto; height:100vh; box-sizing:border-box; }
      .pane { max-width:720px; margin:0 auto; padding:2rem; }
      .pane-title { font-size:1.5rem; margin:0 0 .4rem; }
      .node-status { color:#8b93a7; font-family:ui-monospace,monospace; font-size:.85rem; margin:.2rem 0 1rem; }
      .card { text-align:left; margin-top:1rem; padding:.8rem 1rem; border:1px solid #1c2230; border-radius:.4rem; }
      .card-title { font-size:1rem; margin:0 0 .4rem; color:#7dd3fc; }
      .card-body { font-size:.85rem; }
      .card-subtitle { font-size:.78rem; color:#8b93a7; margin:0 0 .5rem; }
      .empty-state { color:#8b93a7; font-size:.85rem; margin:.3rem 0; }
      .link-button { font:inherit; color:#7dd3fc; background:transparent; border:none; cursor:pointer; padding:0; margin-bottom:.6rem; }
      .session-click { cursor:pointer; border-radius:.4rem; }
      .session-click:hover { background:#11151d; }
      .session-preview-list, .session-list { text-align:left; margin-top:.4rem; display:grid; gap:.4rem; }
      p { color:#8b93a7; margin:.3rem 0; line-height:1.5; }

      /* three-effect preview */
      .three-effect-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:1rem; margin-top:1rem; }
      .three-effect-panel { overflow:hidden; border:1px solid #1c2230; border-radius:.4rem; background:#0b0d12; min-width:0; }
      .three-effect-header { display:flex; align-items:baseline; justify-content:space-between; gap:1rem; padding:.8rem 1rem .65rem; border-bottom:1px solid #1c2230; }
      .three-effect-title { margin:0; color:#7dd3fc; font-size:1rem; }
      .three-effect-caption { margin:0; color:#8b93a7; font-family:ui-monospace,monospace; font-size:.78rem; white-space:nowrap; }
      .three-effect-cube, .three-effect-bezier { display:block; height:260px; min-height:240px; }
      @media (max-width: 720px) { .three-effect-grid { grid-template-columns:1fr; } }

      /* Training pane */
      .training-page { display:grid; gap:1rem; }
      .training-topline { display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; }
      .training-ref { color:#8b93a7; font-family:ui-monospace,monospace; font-size:.78rem; white-space:nowrap; margin-top:.28rem; }
      .training-visual { overflow:hidden; border:1px solid #252a32; border-radius:.45rem; background:#050505; }
      .training-visual-copy { display:flex; align-items:baseline; justify-content:space-between; gap:1rem; padding:.9rem 1rem .75rem; border-bottom:1px solid #1d2128; }
      .training-visual-title { margin:0; color:#f2f4f8; font-size:1rem; }
      .training-visual-caption { margin:0; color:#8b93a7; font-size:.78rem; text-align:right; max-width:380px; }
      .three-effect-training { display:block; height:430px; min-height:360px; }
      .training-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:1rem; }
      .training-panel { border:1px solid #252a32; border-radius:.45rem; padding:.85rem 1rem; background:#0b0d12; min-width:0; }
      .training-panel-title { margin:0 0 .65rem; color:#f2f4f8; font-size:.95rem; }
      .training-panel-copy { margin:0 0 .75rem; color:#9ba3b3; font-size:.82rem; line-height:1.5; }
      .training-metrics { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:.55rem; }
      .training-metric { border:1px solid #20252e; border-radius:.35rem; padding:.55rem .6rem; min-width:0; }
      .training-metric-label { display:block; color:#8b93a7; font-size:.72rem; text-transform:uppercase; letter-spacing:.04em; }
      .training-metric-value { display:block; color:#f2f4f8; font-size:.9rem; font-variant-numeric:tabular-nums; margin-top:.2rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .training-metric.training-watch .training-metric-value { color:#ffcc66; }
      .training-metric.training-blocked .training-metric-value { color:#ff7b72; }
      .training-gates, .training-api-list { list-style:none; margin:0; padding:0; display:grid; gap:.45rem; }
      .training-gate { display:grid; grid-template-columns:auto minmax(0,1fr) auto; align-items:center; gap:.55rem; min-height:24px; }
      .training-gate-dot { width:8px; height:8px; border-radius:50%; background:#e6edf3; box-shadow:0 0 12px rgba(255,255,255,.45); }
      .training-gate.training-watch .training-gate-dot { background:#ffcc66; box-shadow:0 0 12px rgba(255,204,102,.42); }
      .training-gate.training-blocked .training-gate-dot { background:#ff7b72; box-shadow:0 0 12px rgba(255,123,114,.38); }
      .training-gate-label { color:#d8dee9; font-size:.82rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .training-gate-value { color:#8b93a7; font-family:ui-monospace,monospace; font-size:.74rem; text-align:right; white-space:nowrap; }
      .training-action-button { width:100%; border:1px solid #f2f4f8; background:#f2f4f8; color:#050505; border-radius:.35rem; padding:.65rem .8rem; font:inherit; font-weight:700; cursor:pointer; }
      .training-action-button:disabled { opacity:.55; cursor:default; }
      .training-action-status { min-height:18px; margin:.6rem 0 0; color:#8b93a7; font-family:ui-monospace,monospace; font-size:.78rem; }
      .training-action-status.training-info { color:#9ba3b3; }
      .training-action-status.training-success { color:#5ee08a; }
      .training-action-status.training-error { color:#ff7b72; }
      .training-api-list li { color:#9ba3b3; font-size:.82rem; }
      .training-api-list code { color:#f2f4f8; }
      @media (max-width: 820px) {
        .training-topline, .training-visual-copy { display:block; }
        .training-ref { white-space:normal; }
        .training-visual-caption { text-align:left; max-width:none; margin-top:.3rem; }
        .training-grid { grid-template-columns:1fr; }
        .training-metrics { grid-template-columns:1fr; }
        .three-effect-training { height:380px; }
      }

      /* Forms (Ask / Spawn) */
      .text-input, .text-area, .select-input { width:100%; box-sizing:border-box; background:#151515; border:1px solid #525458; border-radius:6px; color:#d7d8e5; font-family:inherit; font-size:13px; padding:10px 12px; margin-bottom:8px; }
      .text-area { resize:vertical; line-height:1.5; }
      .text-area.mono { font-family:Courier, monospace; font-size:12px; }
      .field-label { display:block; color:#8a8c93; font-size:12px; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.05em; }
      .adapter-toggle { display:flex; gap:.4rem; margin-bottom:16px; }
      .adapter-btn { padding:.25rem .6rem; border-radius:.3rem; border:1px solid #1c2230; background:transparent; color:#8b93a7; cursor:pointer; font-size:.8rem; font-family:inherit; }
      .adapter-btn.active { border-color:#7dd3fc; background:#0c1929; color:#7dd3fc; }
      .primary-button { background:#fff; border:none; border-radius:6px; color:#000; cursor:pointer; font-size:14px; font-weight:700; padding:12px 20px; width:100%; }
      .primary-button:disabled { opacity:.5; cursor:default; }
      .spawn-status { color:#d32f2f; font-size:13px; margin:0 0 12px; min-height:18px; }
      .spawn-status.spawn-info { color:#8a8c93; }
      .spawn-status.spawn-error { color:#d32f2f; }

      /* Filter bar (Sessions pane) */
      .filter-bar { display:flex; gap:.4rem; flex-wrap:wrap; margin-bottom:.8rem; }
      .filter-btn { padding:.25rem .6rem; border-radius:.3rem; border:1px solid #1c2230; background:transparent; color:#8b93a7; cursor:pointer; font-size:.8rem; font-family:inherit; }
      .filter-btn.active { border-color:#7dd3fc; background:#0c1929; color:#7dd3fc; }

      /* Approvals / Decisions */
      .approval-row { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.06); }
      .approval-prompt { margin:0; flex:1; font-size:0.85rem; line-height:1.4; word-break:break-word; }
      .approval-buttons { display:flex; gap:6px; flex-shrink:0; }
      .btn-approve { padding:3px 10px; border:none; border-radius:4px; font-size:0.78rem; cursor:pointer; background:#5ee08a; color:#111; font-weight:600; }
      .btn-deny { padding:3px 10px; border:none; border-radius:4px; font-size:0.78rem; cursor:pointer; background:#ff6b6b; color:#111; font-weight:600; }
      .decisions-queue { display:grid; gap:12px; }

      /* Ask list */
      .asks-list { list-style:none; margin:0; padding:0; }
      .ask-row { display:flex; align-items:center; gap:8px; padding:4px 0; }
      .ask-dot { display:inline-block; width:8px; height:8px; border-radius:50%; flex-shrink:0; }
      .ask-text { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:.82rem; color:#8b93a7; }

      /* Balance / assignments / cloud */
      .balance-value { font-size:1.4rem; font-weight:600; margin:0 0 .25rem; color:#e6e9ef; }
      .balance-summary { font-size:.85rem; opacity:.7; margin:0; }
      .assignment-row { padding:.3rem 0; }
      .assignment-goal { font-size:.85rem; color:#cdd3e0; }
      .assignment-meta { font-size:.78rem; color:#8b93a7; font-family:ui-monospace,monospace; }
      .cloud-failover { margin-top:4px; opacity:.7; }

      /* Session detail */
      .detail-ref { font-family:ui-monospace,monospace; font-size:.9rem; color:#cdd3e0; }
      .session-timeline { list-style:none; margin:.2rem 0 .8rem; padding:0 0 0 1rem; border-left:2px solid #1c2230; }
      .event-row { display:flex; justify-content:space-between; gap:1rem; padding:.2rem 0; font-size:.82rem; }
      .event-row.event-expandable { cursor:pointer; }
      .event-detail { color:#cdd3e0; font-family:ui-monospace,monospace; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:420px; }
      .event-meta { color:#6b7488; font-size:.72rem; white-space:nowrap; }
      .event-completed .event-detail { color:#5ee08a; }
      .event-failed .event-detail { color:#ff6b6b; }
      .verify-line { margin:.2rem 0 .2rem; font-size:.82rem; font-family:ui-monospace,monospace; }
      .verify-completed { color:#5ee08a; }
      .verify-failed { color:#ff6b6b; }
      .verify-cancelled { color:#8b93a7; }
      .artifact-line { margin:.1rem 0; font-size:.78rem; color:#8b93a7; font-family:ui-monospace,monospace; }
      .cancel-button { border:1px solid #ff6b6b; color:#ff6b6b; background:transparent; font-family:inherit; font-size:.9rem; padding:.35rem .75rem; border-radius:.3rem; cursor:pointer; margin-top:.4rem; }

      /* Accounts (autopilot-ui AccountList renders inside) */
      .accounts h2 { font-size:.95rem; }

      /* Notifications */
      .notifications { text-align:left; margin-top:1rem; }
      .notif-header { display:flex; align-items:center; gap:.5rem; }
      .notif-header h2 { font-size:1rem; margin:0 0 .3rem; }
      .notif-header.notif-has-high h2 { color:#ff6b6b; }
      .notif-list { list-style:none; margin:0; padding:0; }
      .notif-row { display:flex; flex-direction:column; gap:.1rem; padding:.4rem 0; border-top:1px solid #1c2230; }
      .notif-title { font-size:.85rem; color:#cdd3e0; }
      .notif-body { font-size:.78rem; color:#8b93a7; font-family:ui-monospace,monospace; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .notif-high .notif-title { color:#ff6b6b; }
      .notif-normal .notif-title { color:#5ee08a; }

      /* Deploy card */
      #deploy .deploy-help { font-size:.78rem; color:#8b93a7; margin:0 0 .6rem; }
      #deploy button { font:inherit; font-weight:600; background:#7dd3fc; color:#0b0d12; border:none; border-radius:.4rem; padding:.5rem .9rem; cursor:pointer; }
      #deploy button:disabled { opacity:.5; cursor:default; }
      .deploy-status { margin:.5rem 0 0; font-size:.8rem; font-family:ui-monospace,monospace; color:#cdd3e0; }
      .deploy-status.ask-info { color:#8b949e; }
      .deploy-status.ask-success { color:#3fb950; }
      .deploy-status.ask-error { color:#f85149; }
      .deploy-queued { color:#ffb454; }
      .deploy-building { color:#ffb454; }
      .deploy-deployed { color:#5ee08a; }
      .deploy-failed { color:#ff6b6b; }
      .deploy-unknown { color:#8b93a7; }
    </style>
    <script src="views://autopilot-desktop/main.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
