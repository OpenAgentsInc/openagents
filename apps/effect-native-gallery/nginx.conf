# Effect Native component gallery (Cloud Run listens on 8080).
#
# Static-host contract (effect-native docs/gallery.md): extensionless HTML
# requests such as /stories/button-primary rewrite to index.html so the
# client router can resolve the story from the path, while asset requests
# such as /app.js still 404 when the file is missing.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml application/xml;

    # Requests with a file extension are assets: serve or 404, never rewrite.
    location ~ \.[^/]+$ {
        try_files $uri =404;
    }

    # Extensionless routes (/, /stories/<story-id>) fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
