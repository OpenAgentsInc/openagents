# effectnative.org static site (Cloud Run listens on 8080).
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # www redirects to the apex domain (both hostnames map to this service).
    if ($host = "www.effectnative.org") {
        return 301 https://effectnative.org$request_uri;
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml application/xml;

    error_page 404 /404.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
