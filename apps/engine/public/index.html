<!DOCTYPE html>
<html>

<head>
  <title>OpenAgents Engine</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="/htmx.min.js"></script>
  <script src="/ws.js"></script>
  <script src="/tailwind.js"></script>
</head>

<body class="bg-black text-white font-mono m-0 p-5 h-screen box-border flex justify-center items-center" hx-ext="ws">
  <div ws-connect="ws://localhost:3000/ws">
    <div class="border border-neutral-600 rounded p-8 mx-auto w-[500px] bg-neutral-900">
      <div
        class="flex justify-between mb-3 pb-3 border-b border-neutral-700 last:border-b-0 last:mb-0 last:pb-0 gap-20">
        <div class="font-bold text-neutral-400 text-lg">Connection:</div>
        <div class="text-lg font-medium text-red-500" id="connection-status">Disconnected</div>
      </div>

      <div
        class="flex justify-between mb-3 pb-3 border-b border-neutral-700 last:border-b-0 last:mb-0 last:pb-0 gap-20">
        <div class="font-bold text-neutral-400 text-lg">Agent Status:</div>
        <div class="text-lg font-medium" id="agent-status">Waiting for status...</div>
      </div>
    </div>
  </div>
</body>

</html>
