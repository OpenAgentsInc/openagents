<!DOCTYPE html>
<html>

<head>
  <title>OpenAgents Engine</title>
  <script src="/htmx.min.js"></script>
  <script src="/sse.js"></script>
  <style>
    html,
    body {
      background-color: black;
      color: white;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }
  </style>
</head>

<body hx-ext="ws">
  <div ws-connect="ws://localhost:3000/ws">
    <h1>WebSocket Test</h1>
    <div id="messages"></div>
    <form ws-send hx-trigger="submit" hx-prevent-default="true">
      <input type="text" name="message" placeholder="Type a message...">
      <button type="submit">Send</button>
    </form>
  </div>
</body>

</html>
