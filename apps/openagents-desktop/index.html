<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; worker-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'none'; base-uri 'none'; form-action 'none'; object-src 'none'"
    />
    <title>OpenAgents</title>
    <link rel="stylesheet" href="./app.css" />
    <!--
      Branded boot frame (2026-07-13 startup incident,
      openagents_desktop.startup.window_first_no_blank_frame.v1): paints with
      the very first HTML parse, BEFORE the renderer bundle evaluates and
      before the Effect Native token pipeline installs the runtime `--en-*`
      variables — so its colors are literal values from the default Khala
      editor projection, kept in mechanical sync by
      src/startup-contract.test.ts (same practice as the BrowserWindow
      backgroundColor in src/main.ts). boot.ts removes the frame the moment
      the real shell mounts underneath it. No light variant, ever.
    -->
    <style>
      /* khalaEditorDesktopThemeProjection.effectNative.background */
      #openagents-boot-frame {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #05070d;
      }
      /* khalaEditorDesktopThemeProjection.effectNative.textFaint */
      #openagents-boot-frame .oa-boot-mark {
        color: #8990ad;
        font-family: "Inter Variable", Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.42em;
        text-indent: 0.42em;
        text-transform: uppercase;
        user-select: none;
      }
      /* Khala borderSubtle track and energy-blue accent sweep */
      #openagents-boot-frame .oa-boot-psi {
        width: 168px;
        height: 2px;
        border-radius: 2px;
        overflow: hidden;
        background: #16203a;
      }
      #openagents-boot-frame .oa-boot-psi-fill {
        width: 40%;
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(90deg, transparent, #3b82f6, transparent);
        animation: oa-boot-psi-sweep 1.1s ease-in-out infinite;
      }
      @keyframes oa-boot-psi-sweep {
        from { transform: translateX(-100%); }
        to { transform: translateX(350%); }
      }
      @media (prefers-reduced-motion: reduce) {
        #openagents-boot-frame .oa-boot-psi-fill { animation: none; transform: translateX(75%); }
      }
    </style>
  </head>
  <body>
    <div id="openagents-boot-frame" aria-hidden="true">
      <div class="oa-boot-mark">OpenAgents</div>
      <div class="oa-boot-psi"><div class="oa-boot-psi-fill"></div></div>
    </div>
    <main id="openagents-desktop-root" aria-label="OpenAgents shell"></main>
    <script src="./boot.js"></script>
  </body>
</html>
