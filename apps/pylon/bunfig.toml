# Tests need the @opentui/solid JSX transform preloaded. Normal runs do NOT
# preload it here: subcommands (bootstrap/status/wallet/...) must work even
# if the transform cannot load, and the dashboard path registers it via a
# one-shot --preload re-exec (see ensureSolidRuntime in src/index.ts).
[test]
preload = ["@opentui/solid/preload"]
