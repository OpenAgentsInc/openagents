name: Pylon release gate

on:
  pull_request:
    paths:
      - "apps/pylon/**"
      - ".github/workflows/pylon-release-gate.yml"
  push:
    branches:
      - main
    paths:
      - "apps/pylon/**"
      - ".github/workflows/pylon-release-gate.yml"
  workflow_dispatch:

concurrency:
  group: pylon-release-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gate:
    name: release gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Run Pylon tests
        working-directory: apps/pylon
        run: bun run test

      - name: Run package dry-run
        working-directory: apps/pylon
        run: bun pm pack --dry-run

      - name: Run local install smoke
        working-directory: apps/pylon
        run: bun run smoke:install:local
