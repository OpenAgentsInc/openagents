<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Khala Code</title>
  </head>
  <body>
    <main class="khala-code-shell antialiased" aria-label="Khala Code chat">
      <aside id="sidebar-root" class="khala-code-sidebar-shell" aria-label="Khala Code sidebar">
        <div id="sidebar-nav-root" class="khala-code-sidebar" aria-label="Khala Code navigation"></div>
        <section
          id="thread-sidebar"
          class="khala-code-thread-sidebar"
          aria-label="Codex threads"
          hidden
        ></section>
      </aside>
      <div class="khala-code-scene" aria-hidden="true"></div>
      <section class="khala-code-thread-shell" aria-label="Khala Code transcript">
        <div class="khala-thread-token-meter" id="thread-token-meter">
          <button
            id="thread-token-counter"
            class="khala-thread-token-counter"
            type="button"
            aria-expanded="false"
            aria-controls="thread-token-popover"
            title="Thread tokens"
          >
            <span id="thread-token-counter-value">0</span>
            <span class="khala-thread-token-counter-label">tokens</span>
          </button>
          <div
            id="thread-token-popover"
            class="khala-thread-token-popover"
            role="status"
            hidden
          ></div>
        </div>
        <div
          id="message-list"
          class="message-list"
          data-khala-code-messages
          aria-live="polite"
        ></div>
      </section>
      <section class="composer-dock" aria-label="Message composer">
        <form
          id="composer-form"
          class="oa-ai-command-composer khala-code-composer"
          data-oa-command-composer
          data-oa-command-composer-status="ready"
          data-oa-command-composer-expanded="false"
        >
          <div
            id="composer-hud"
            class="khala-code-composer-hud"
            aria-hidden="true"
          ></div>
          <div id="composer-frame" class="oa-ai-command-composer-frame">
          <label for="composer-input" class="oa-ai-command-composer-label">
            Message Khala Code
          </label>
          <div
            id="composer-rail"
            class="oa-ai-command-composer-rail"
            data-oa-command-composer-rail
            data-oa-command-composer-drop-target
            data-oa-command-composer-drag-active="false"
            role="list"
            aria-label="Composer attachments"
            hidden
          ></div>
          <textarea
            id="composer-input"
            class="oa-ai-command-composer-textarea"
            name="khala-code-message"
            rows="2"
            autocomplete="off"
            autofocus
            spellcheck="true"
            placeholder="Send a message"
            aria-label="Message Khala Code"
            aria-describedby="composer-a11y"
            data-oa-command-composer-textarea
            data-oa-command-composer-native-editing="true"
            data-oa-command-composer-focus-after-submit
            data-oa-command-composer-autofocus
          ></textarea>
          <div
            id="slash-command-palette"
            class="khala-code-slash-command-palette"
            role="listbox"
            aria-label="Slash commands"
            hidden
          ></div>
          <div
            id="composer-preview"
            class="oa-ai-command-composer-markdown-preview khala-code-composer-preview"
            data-oa-command-composer-preview
            hidden
          ></div>
          <div class="oa-ai-command-composer-footer">
            <div
              id="composer-controls"
              class="oa-ai-command-composer-controls"
              data-oa-command-composer-controls
            >
              <button
                id="attach-button"
                class="oa-ai-command-composer-button"
                type="button"
                aria-label="Attach files"
                title="Attach files"
                data-oa-command-composer-control="Attach"
                data-variant="ghost"
              >
                <span
                  class="oa-ai-command-composer-icon"
                  aria-hidden="true"
                  data-oa-command-composer-icon="attach"
                ></span>
                <span class="oa-ai-command-composer-button-label">Attach</span>
              </button>
            </div>
            <div
              id="composer-status"
              class="oa-ai-command-composer-status"
              data-oa-command-composer-status-label="ready"
              aria-live="polite"
            ></div>
            <button
              id="send-button"
              class="oa-ai-command-composer-submit"
              type="submit"
              aria-label="Send message"
              title="Send"
              data-oa-command-composer-submit="send"
              data-status="ready"
            >
              <span
                class="oa-ai-command-composer-icon"
                aria-hidden="true"
                data-oa-command-composer-icon="send"
              ></span>
              <span class="oa-ai-command-composer-submit-label">Send</span>
            </button>
          </div>
          <div id="composer-a11y" class="oa-ai-command-composer-a11y" aria-live="polite"></div>
          <input
            id="file-input"
            class="khala-code-file-input"
            type="file"
            multiple
            tabindex="-1"
            aria-hidden="true"
          />
          </div>
        </form>
      </section>
      <section
        id="fleet-panel"
        class="khala-code-fleet"
        aria-label="Fleet status"
        hidden
      ></section>
      <section
        id="forum-panel"
        class="khala-code-forum"
        aria-label="OpenAgents Forum"
        hidden
      ></section>
      <section
        id="inbox-panel"
        class="khala-code-inbox"
        aria-label="Unified Inbox"
        hidden
      ></section>
      <section
        id="gym-panel"
        class="khala-code-gym"
        aria-label="Gym proof"
        hidden
      ></section>
      <section
        id="settings-panel"
        class="khala-code-settings"
        aria-label="Codex settings"
        hidden
      ></section>
      <section
        id="foldkit-demo-panel"
        class="khala-code-foldkit-host"
        aria-label="Foldkit embedding skeleton"
        hidden
      ></section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
