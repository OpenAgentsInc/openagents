# XcodeGen spec for the Khala native SwiftUI app.
# Regenerate Khala.xcodeproj with:  xcodegen generate
# (A hand-authored Khala.xcodeproj is also committed so the app opens in Xcode
#  without xcodegen installed; regenerate from this spec if it drifts.)
name: Khala
options:
  bundleIdPrefix: com.openagents
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: HQWSG26L43
    CODE_SIGN_STYLE: Automatic

targets:
  Khala:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Khala
    postBuildScripts:
      - name: Bundle Apple FM bridge helper
        script: bash "$SRCROOT/scripts/copy-packaged-apple-fm-bridge.sh"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openagents.khala
        PRODUCT_NAME: Khala
        INFOPLIST_FILE: Khala/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
  KhalaTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KhalaTests
    dependencies:
      - target: Khala
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openagents.khala.tests
        PRODUCT_NAME: KhalaTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Khala.app/Khala"
        BUNDLE_LOADER: "$(TEST_HOST)"
