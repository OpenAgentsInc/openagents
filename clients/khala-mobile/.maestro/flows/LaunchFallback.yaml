# flow: Khala Mobile launch and public-safe sign-in fallback
# intent:
# Prove the installed app launches and renders the mobile-only GitHub sign-in
# fallback. Run this on a simulator/emulator or device with no stored Khala
# Mobile credentials.
#
appId: ${MAESTRO_APP_ID}
onFlowStart:
  - runFlow: ../shared/_OnFlowStart.yaml
---
- assertVisible: "Khala Code"
- assertVisible: "Log in with GitHub"
- assertVisible: "Khala Code"
