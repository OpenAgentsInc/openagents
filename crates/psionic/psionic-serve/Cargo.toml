[package]
name = "psionic-serve"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
publish.workspace = true
description = "Served compute product contracts for Psionic"

[lints]
workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
axum = "0.8"
hex = { workspace = true }
psionic-adapters = { path = "../psionic-adapters" }
psionic-backend-cuda = { path = "../psionic-backend-cuda" }
psionic-backend-cpu = { path = "../psionic-backend-cpu" }
psionic-backend-metal = { path = "../psionic-backend-metal" }
psionic-catalog = { path = "../psionic-catalog" }
psionic-compiler = { path = "../psionic-compiler" }
psionic-core = { path = "../psionic-core" }
psionic-ir = { path = "../psionic-ir" }
psionic-models = { path = "../psionic-models" }
psionic-runtime = { path = "../psionic-runtime" }
rand = { workspace = true }
reqwest = { workspace = true, features = ["blocking"] }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-stream = "0.1"

[dev-dependencies]
psionic-provider = { path = "../psionic-provider" }
tempfile = "3"
