[package]
name = "openagents-spark"
version = "0.1.23"
edition = "2024"
authors = ["OpenAgents"]
license = "CC-0"
publish = false
description = "Spark Lightning wallet integration for OpenAgents"

[lints]
rust.missing_docs = "allow"

[lib]
path = "src/lib.rs"

[dependencies]
bip39 = "2.2.0"
bitcoin = { version = "0.32.6", features = ["serde"] }
thiserror = "2.0.12"
hex = "0.4.3"
dirs = "6.0.0"
breez-sdk-spark = { git = "https://github.com/breez/spark-sdk", tag = "0.13.10" }
spark-wallet = { git = "https://github.com/breez/spark-sdk", tag = "0.13.10" }

[dev-dependencies]
spark-sdk-internal = { package = "spark", git = "https://github.com/breez/spark-sdk", tag = "0.13.10" }
