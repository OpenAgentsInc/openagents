<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 640" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0d10"/>
      <stop offset="1" stop-color="#14181d"/>
    </linearGradient>
    <linearGradient id="lane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1f28"/>
      <stop offset="1" stop-color="#10141a"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#F5A623"/>
    </marker>
    <marker id="arr-buy" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7aa6ff"/>
    </marker>
  </defs>

  <rect width="980" height="640" fill="url(#bg)"/>

  <text x="490" y="32" fill="#e6edf3" font-size="16" text-anchor="middle" letter-spacing="2">DATA MARKET EVENT FLOW</text>
  <text x="490" y="54" fill="#7d8493" font-size="11" text-anchor="middle">handler publishes capability · buyer requests · invoice settles · result delivered</text>

  <!-- Three swimlanes -->
  <g>
    <rect x="40"  y="90" width="220" height="500" rx="6" fill="url(#lane)" stroke="#2a313d"/>
    <text x="150" y="116" fill="#7aa6ff" font-size="12" text-anchor="middle" font-weight="700">BUYER</text>

    <rect x="380" y="90" width="220" height="500" rx="6" fill="url(#lane)" stroke="#2a313d"/>
    <text x="490" y="116" fill="#F5A623" font-size="12" text-anchor="middle" font-weight="700">RELAYS</text>
    <text x="490" y="132" fill="#7d8493" font-size="10" text-anchor="middle">damus.io · primal.net</text>

    <rect x="720" y="90" width="220" height="500" rx="6" fill="url(#lane)" stroke="#2a313d"/>
    <text x="830" y="116" fill="#9bd99b" font-size="12" text-anchor="middle" font-weight="700">HANDLER</text>
  </g>

  <!-- Step 0: Capability advertisement (handler -> relays) -->
  <g>
    <text x="20" y="170" fill="#7d8493" font-size="10">0</text>
    <line x1="720" y1="170" x2="600" y2="170" stroke="#F5A623" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="612" y="152" width="96" height="36" rx="4" fill="#1e2530" stroke="#F5A623"/>
    <text x="660" y="170" fill="#F5A623" font-size="11" text-anchor="middle" font-weight="700">kind 31990</text>
    <text x="660" y="182" fill="#9aa4b2" font-size="9" text-anchor="middle">capability ad</text>
    <text x="600" y="200" fill="#7d8493" font-size="9" text-anchor="end">+ kind 30404 listing · 30406 offer</text>
  </g>

  <!-- Step 1: Buyer request -->
  <g>
    <text x="20" y="240" fill="#7d8493" font-size="10">1</text>
    <line x1="260" y1="240" x2="380" y2="240" stroke="#7aa6ff" stroke-width="1.5" marker-end="url(#arr-buy)"/>
    <rect x="278" y="222" width="86" height="36" rx="4" fill="#1e2530" stroke="#7aa6ff"/>
    <text x="321" y="240" fill="#7aa6ff" font-size="11" text-anchor="middle" font-weight="700">kind 5960</text>
    <text x="321" y="252" fill="#9aa4b2" font-size="9" text-anchor="middle">buyer request</text>
  </g>

  <!-- Step 2: Relay forward to handler -->
  <g>
    <text x="20" y="290" fill="#7d8493" font-size="10">2</text>
    <line x1="600" y1="290" x2="720" y2="290" stroke="#7aa6ff" stroke-width="1.5" marker-end="url(#arr-buy)"/>
    <text x="660" y="282" fill="#7d8493" font-size="9" text-anchor="middle">handler ingests 5960</text>
  </g>

  <!-- Step 3: payment-required feedback -->
  <g>
    <text x="20" y="340" fill="#7d8493" font-size="10">3</text>
    <line x1="720" y1="340" x2="600" y2="340" stroke="#F5A623" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="612" y="322" width="96" height="36" rx="4" fill="#1e2530" stroke="#F5A623"/>
    <text x="660" y="340" fill="#F5A623" font-size="11" text-anchor="middle" font-weight="700">NIP-90 fb</text>
    <text x="660" y="352" fill="#9aa4b2" font-size="9" text-anchor="middle">payment-required</text>
    <text x="720" y="340" fill="#7d8493" font-size="9" text-anchor="start" dx="6"></text>
    <line x1="600" y1="340" x2="260" y2="340" stroke="#F5A623" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr)"/>
    <text x="430" y="332" fill="#7d8493" font-size="9" text-anchor="middle">+ Lightning invoice</text>
  </g>

  <!-- Step 4: Spark settlement (off-protocol band) -->
  <g>
    <text x="20" y="410" fill="#7d8493" font-size="10">4</text>
    <rect x="60" y="392" width="860" height="36" rx="4" fill="#15282a" stroke="#3a8579"/>
    <text x="490" y="416" fill="#7ad8c2" font-size="11" text-anchor="middle" font-weight="700">⚡ Lightning settlement (Spark)</text>
    <text x="170" y="416" fill="#7ad8c2" font-size="10" text-anchor="middle">buyer pays</text>
    <text x="830" y="416" fill="#7ad8c2" font-size="10" text-anchor="middle">handler observes</text>
  </g>

  <!-- Step 5: kind 30407 access contract -->
  <g>
    <text x="20" y="470" fill="#7d8493" font-size="10">5</text>
    <line x1="720" y1="470" x2="600" y2="470" stroke="#F5A623" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="612" y="452" width="96" height="36" rx="4" fill="#1e2530" stroke="#F5A623"/>
    <text x="660" y="470" fill="#F5A623" font-size="11" text-anchor="middle" font-weight="700">kind 30407</text>
    <text x="660" y="482" fill="#9aa4b2" font-size="9" text-anchor="middle">access contract</text>
  </g>

  <!-- Step 6: kind 6960 result -->
  <g>
    <text x="20" y="530" fill="#7d8493" font-size="10">6</text>
    <line x1="720" y1="530" x2="600" y2="530" stroke="#F5A623" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="612" y="512" width="96" height="36" rx="4" fill="#1e2530" stroke="#F5A623"/>
    <text x="660" y="530" fill="#F5A623" font-size="11" text-anchor="middle" font-weight="700">kind 6960</text>
    <text x="660" y="542" fill="#9aa4b2" font-size="9" text-anchor="middle">result + bundle</text>
    <line x1="600" y1="530" x2="260" y2="530" stroke="#F5A623" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr)"/>
    <text x="430" y="522" fill="#7d8493" font-size="9" text-anchor="middle">buyer fetches DeliveryBundle</text>
  </g>

  <!-- Footer note -->
  <text x="490" y="610" fill="#7d8493" font-size="10" text-anchor="middle">every kind-6960 result is paired with a kernel-signed DeliveryBundle · kind 31990 is NIP-89-shaped (full conformance pending)</text>
</svg>
