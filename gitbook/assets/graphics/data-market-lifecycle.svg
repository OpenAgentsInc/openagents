<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 360" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0d10"/>
      <stop offset="1" stop-color="#14181d"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2530"/>
      <stop offset="1" stop-color="#151a22"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#F5A623"/>
    </marker>
  </defs>

  <rect width="980" height="360" fill="url(#bg)"/>

  <text x="490" y="32" fill="#e6edf3" font-size="16" text-anchor="middle" letter-spacing="2">HANDLER LIFECYCLE</text>
  <text x="490" y="54" fill="#7d8493" font-size="11" text-anchor="middle">six states — every transition mints or updates kernel authority</text>

  <!-- 6 horizontal nodes -->
  <g>
    <rect x="30"  y="130" width="140" height="80" rx="6" fill="url(#node)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="100" y="158" fill="#F5A623" font-size="11" text-anchor="middle" font-weight="700">1</text>
    <text x="100" y="178" fill="#e6edf3" font-size="11" text-anchor="middle">invoice_</text>
    <text x="100" y="192" fill="#e6edf3" font-size="11" text-anchor="middle">requested</text>
    <text x="100" y="234" fill="#7d8493" font-size="9" text-anchor="middle">kind 5960 in</text>
    <text x="100" y="246" fill="#7d8493" font-size="9" text-anchor="middle">validate offer</text>
  </g>

  <g>
    <rect x="190" y="130" width="140" height="80" rx="6" fill="url(#node)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="260" y="158" fill="#F5A623" font-size="11" text-anchor="middle" font-weight="700">2</text>
    <text x="260" y="178" fill="#e6edf3" font-size="11" text-anchor="middle">publishing_</text>
    <text x="260" y="192" fill="#e6edf3" font-size="11" text-anchor="middle">feedback</text>
    <text x="260" y="234" fill="#7d8493" font-size="9" text-anchor="middle">NIP-90 fb out</text>
    <text x="260" y="246" fill="#7d8493" font-size="9" text-anchor="middle">payment-required</text>
  </g>

  <g>
    <rect x="350" y="130" width="140" height="80" rx="6" fill="url(#node)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="420" y="158" fill="#F5A623" font-size="11" text-anchor="middle" font-weight="700">3</text>
    <text x="420" y="178" fill="#e6edf3" font-size="11" text-anchor="middle">awaiting_</text>
    <text x="420" y="192" fill="#e6edf3" font-size="11" text-anchor="middle">payment</text>
    <text x="420" y="234" fill="#7d8493" font-size="9" text-anchor="middle">invoice open</text>
    <text x="420" y="246" fill="#7d8493" font-size="9" text-anchor="middle">pending grant</text>
  </g>

  <g>
    <rect x="510" y="130" width="140" height="80" rx="6" fill="url(#node)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="580" y="158" fill="#F5A623" font-size="11" text-anchor="middle" font-weight="700">4</text>
    <text x="580" y="180" fill="#e6edf3" font-size="11" text-anchor="middle">paid</text>
    <text x="580" y="234" fill="#7d8493" font-size="9" text-anchor="middle">⚡ settled</text>
    <text x="580" y="246" fill="#7d8493" font-size="9" text-anchor="middle">grant finalized · 30407</text>
  </g>

  <g>
    <rect x="670" y="130" width="140" height="80" rx="6" fill="url(#node)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="740" y="158" fill="#F5A623" font-size="11" text-anchor="middle" font-weight="700">5</text>
    <text x="740" y="180" fill="#e6edf3" font-size="11" text-anchor="middle">delivery</text>
    <text x="740" y="234" fill="#7d8493" font-size="9" text-anchor="middle">bundle minted</text>
    <text x="740" y="246" fill="#7d8493" font-size="9" text-anchor="middle">kind 6960 out</text>
  </g>

  <g>
    <rect x="830" y="130" width="140" height="80" rx="6" fill="url(#node)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="900" y="158" fill="#F5A623" font-size="11" text-anchor="middle" font-weight="700">6</text>
    <text x="900" y="180" fill="#e6edf3" font-size="11" text-anchor="middle">revocation</text>
    <text x="900" y="234" fill="#7d8493" font-size="9" text-anchor="middle">policy expiry</text>
    <text x="900" y="246" fill="#7d8493" font-size="9" text-anchor="middle">RevocationReceipt</text>
  </g>

  <!-- Arrows -->
  <line x1="170" y1="170" x2="190" y2="170" stroke="#F5A623" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="330" y1="170" x2="350" y2="170" stroke="#F5A623" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="170" x2="510" y2="170" stroke="#F5A623" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="650" y1="170" x2="670" y2="170" stroke="#F5A623" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="810" y1="170" x2="830" y2="170" stroke="#F5A623" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <text x="490" y="310" fill="#7d8493" font-size="10" text-anchor="middle">authoritative spec: docs/plans/data-market-mvp-implementation-spec.md</text>
  <text x="490" y="326" fill="#7d8493" font-size="10" text-anchor="middle">stalled at state 3 (buyer never paid) is normal — lifecycle aborts cleanly</text>
</svg>
