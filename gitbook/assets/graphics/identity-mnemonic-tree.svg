<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0d10"/>
      <stop offset="1" stop-color="#14181d"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2530"/>
      <stop offset="1" stop-color="#151a22"/>
    </linearGradient>
    <linearGradient id="seed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2d12"/>
      <stop offset="1" stop-color="#1f1607"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#F5A623"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="url(#bg)"/>

  <text x="440" y="32" fill="#e6edf3" font-size="16" text-anchor="middle" letter-spacing="2">ONE MNEMONIC · TWO ROLES</text>
  <text x="440" y="54" fill="#7d8493" font-size="11" text-anchor="middle">backing up the seed backs up your identity AND your wallet</text>

  <!-- The seed (top) -->
  <g>
    <rect x="220" y="100" width="440" height="110" rx="8" fill="url(#seed)" stroke="#F5A623" stroke-width="2"/>
    <text x="440" y="128" fill="#F5A623" font-size="12" text-anchor="middle" letter-spacing="2">THE SEED</text>
    <text x="440" y="156" fill="#e6edf3" font-size="14" text-anchor="middle" font-weight="700">~/.openagents/pylon/identity.mnemonic</text>
    <text x="440" y="178" fill="#9aa4b2" font-size="10" text-anchor="middle">12 or 24 words · chmod 600 · back up before funding</text>
    <text x="440" y="194" fill="#7d8493" font-size="9" text-anchor="middle">crates/nostr/core/src/identity.rs</text>
  </g>

  <!-- Branches: arrows -->
  <line x1="340" y1="210" x2="240" y2="280" stroke="#F5A623" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="540" y1="210" x2="640" y2="280" stroke="#F5A623" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Nostr identity (left) -->
  <g>
    <rect x="80" y="290" width="320" height="120" rx="6" fill="url(#node)" stroke="#7aa6ff" stroke-width="1.5"/>
    <text x="240" y="318" fill="#7aa6ff" font-size="13" text-anchor="middle" font-weight="700">Nostr identity</text>
    <text x="240" y="340" fill="#9aa4b2" font-size="10" text-anchor="middle">signs every published event</text>
    <text x="240" y="360" fill="#7d8493" font-size="9" text-anchor="middle">capability ads · job results</text>
    <text x="240" y="374" fill="#7d8493" font-size="9" text-anchor="middle">access contracts · revocations</text>
    <text x="240" y="394" fill="#7d8493" font-size="9" text-anchor="middle">your reputation portable to any relay</text>
  </g>

  <!-- Spark wallet (right) -->
  <g>
    <rect x="480" y="290" width="320" height="120" rx="6" fill="url(#node)" stroke="#f7c93e" stroke-width="1.5"/>
    <text x="640" y="318" fill="#f7c93e" font-size="13" text-anchor="middle" font-weight="700">⚡ Spark wallet</text>
    <text x="640" y="340" fill="#9aa4b2" font-size="10" text-anchor="middle">receives sats · authorizes withdrawals</text>
    <text x="640" y="360" fill="#7d8493" font-size="9" text-anchor="middle">no custodian · no recovery email</text>
    <text x="640" y="374" fill="#7d8493" font-size="9" text-anchor="middle">no second factor</text>
    <text x="640" y="394" fill="#7d8493" font-size="9" text-anchor="middle">crates/spark/src/spark_wallet.rs:380</text>
  </g>

  <!-- Footer warning -->
  <rect x="80" y="430" width="720" height="32" rx="4" fill="#2a1818" stroke="#a8313a" stroke-width="1"/>
  <text x="440" y="450" fill="#ff8a8a" font-size="10" text-anchor="middle">if this file is gone, both are gone · if it leaks, both leak · custody discipline = wallet discipline</text>
</svg>
