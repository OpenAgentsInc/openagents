<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 540" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0d10"/>
      <stop offset="1" stop-color="#14181d"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2530"/>
      <stop offset="1" stop-color="#151a22"/>
    </linearGradient>
    <linearGradient id="kernel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22282f"/>
      <stop offset="1" stop-color="#171c22"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#F5A623"/>
    </marker>
    <marker id="arr-d" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7d8493"/>
    </marker>
  </defs>

  <rect width="980" height="540" fill="url(#bg)"/>

  <text x="490" y="32" fill="#e6edf3" font-size="16" text-anchor="middle" letter-spacing="2">KERNEL AUTHORITY OBJECTS</text>
  <text x="490" y="54" fill="#7d8493" font-size="11" text-anchor="middle">five signed objects that turn a paid job into audit-grade state</text>

  <!-- Kernel container -->
  <rect x="60" y="90" width="860" height="380" rx="10" fill="url(#kernel)" stroke="#F5A623" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.9"/>
  <text x="80" y="118" fill="#F5A623" font-size="11" letter-spacing="2">ECONOMY KERNEL · crates/openagents-kernel-core</text>

  <!-- DataAsset (top-left) -->
  <g>
    <rect x="100" y="150" width="220" height="100" rx="6" fill="url(#node)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="210" y="178" fill="#F5A623" font-size="13" text-anchor="middle" font-weight="700">DataAsset</text>
    <text x="210" y="200" fill="#9aa4b2" font-size="10" text-anchor="middle">the thing being sold</text>
    <text x="210" y="218" fill="#7d8493" font-size="9" text-anchor="middle">content hash · schema</text>
    <text x="210" y="232" fill="#7d8493" font-size="9" text-anchor="middle">provenance metadata</text>
  </g>

  <!-- PermissionPolicy (top-right) -->
  <g>
    <rect x="660" y="150" width="220" height="100" rx="6" fill="url(#node)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="770" y="178" fill="#F5A623" font-size="13" text-anchor="middle" font-weight="700">PermissionPolicy</text>
    <text x="770" y="200" fill="#9aa4b2" font-size="10" text-anchor="middle">who · how · how long</text>
    <text x="770" y="218" fill="#7d8493" font-size="9" text-anchor="middle">scope · expiry</text>
    <text x="770" y="232" fill="#7d8493" font-size="9" text-anchor="middle">conditions</text>
  </g>

  <!-- AccessGrant (center) -->
  <g>
    <rect x="380" y="150" width="220" height="100" rx="6" fill="url(#node)" stroke="#F5A623" stroke-width="2"/>
    <text x="490" y="178" fill="#F5A623" font-size="13" text-anchor="middle" font-weight="700">AccessGrant</text>
    <text x="490" y="200" fill="#9aa4b2" font-size="10" text-anchor="middle">a buyer's signed grant</text>
    <text x="490" y="218" fill="#7d8493" font-size="9" text-anchor="middle">scoped · revocable</text>
    <text x="490" y="232" fill="#7d8493" font-size="9" text-anchor="middle">→ kind 30407</text>
  </g>

  <!-- DeliveryBundle (bottom-left) -->
  <g>
    <rect x="220" y="320" width="220" height="100" rx="6" fill="url(#node)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="330" y="348" fill="#F5A623" font-size="13" text-anchor="middle" font-weight="700">DeliveryBundle</text>
    <text x="330" y="370" fill="#9aa4b2" font-size="10" text-anchor="middle">materialized payload</text>
    <text x="330" y="388" fill="#7d8493" font-size="9" text-anchor="middle">handed to paid buyer</text>
    <text x="330" y="402" fill="#7d8493" font-size="9" text-anchor="middle">→ kind 6960 result</text>
  </g>

  <!-- RevocationReceipt (bottom-right) -->
  <g>
    <rect x="540" y="320" width="220" height="100" rx="6" fill="url(#node)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="650" y="348" fill="#F5A623" font-size="13" text-anchor="middle" font-weight="700">RevocationReceipt</text>
    <text x="650" y="370" fill="#9aa4b2" font-size="10" text-anchor="middle">grant ended · why · when</text>
    <text x="650" y="388" fill="#7d8493" font-size="9" text-anchor="middle">policy expiry · dispute</text>
    <text x="650" y="402" fill="#7d8493" font-size="9" text-anchor="middle">signed audit trail</text>
  </g>

  <!-- Relationship arrows: DataAsset -> AccessGrant <- PermissionPolicy -->
  <line x1="320" y1="200" x2="380" y2="200" stroke="#F5A623" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="660" y1="200" x2="600" y2="200" stroke="#F5A623" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="350" y="190" fill="#7d8493" font-size="9" text-anchor="middle">covers</text>
  <text x="630" y="190" fill="#7d8493" font-size="9" text-anchor="middle">applies</text>

  <!-- AccessGrant -> DeliveryBundle / RevocationReceipt -->
  <line x1="430" y1="250" x2="360" y2="320" stroke="#F5A623" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="550" y1="250" x2="620" y2="320" stroke="#F5A623" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="370" y="296" fill="#7d8493" font-size="9" text-anchor="middle">delivers</text>
  <text x="610" y="296" fill="#7d8493" font-size="9" text-anchor="middle">closes</text>

  <text x="490" y="510" fill="#7d8493" font-size="10" text-anchor="middle">every object is signed kernel state — these receipts are the diligence path</text>
</svg>
