<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0d10"/>
      <stop offset="1" stop-color="#14181d"/>
    </linearGradient>
    <linearGradient id="t1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a1c1c"/>
      <stop offset="1" stop-color="#1d0e0e"/>
    </linearGradient>
    <linearGradient id="t2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33260e"/>
      <stop offset="1" stop-color="#1d1607"/>
    </linearGradient>
    <linearGradient id="t3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2230"/>
      <stop offset="1" stop-color="#0f141c"/>
    </linearGradient>
  </defs>

  <rect width="920" height="540" fill="url(#bg)"/>

  <text x="460" y="32" fill="#e6edf3" font-size="16" text-anchor="middle" letter-spacing="2">KEY CUSTODY · BLAST-RADIUS TIERS</text>
  <text x="460" y="54" fill="#7d8493" font-size="11" text-anchor="middle">spend custody effort proportional to the damage a leak would cause</text>

  <!-- Tier 1: Mnemonic (largest, top, deepest red) -->
  <g>
    <rect x="80" y="90" width="760" height="130" rx="8" fill="url(#t1)" stroke="#d04a4a" stroke-width="2"/>
    <text x="110" y="118" fill="#d04a4a" font-size="11" letter-spacing="2">TIER 1 · TOTAL BLAST RADIUS</text>
    <text x="110" y="148" fill="#e6edf3" font-size="14" font-weight="700">The mnemonic</text>
    <text x="110" y="170" fill="#9aa4b2" font-size="11">~/.openagents/pylon/identity.mnemonic</text>
    <text x="110" y="190" fill="#7d8493" font-size="10">if lost: identity gone · wallet gone · history gone · reputation gone · game over</text>
    <text x="110" y="206" fill="#7d8493" font-size="10">discipline: metal plate backup · chmod 600 · never paste anywhere · rotate by migrating</text>
  </g>

  <!-- Tier 2: Credentials (medium, amber) -->
  <g>
    <rect x="120" y="240" width="680" height="130" rx="8" fill="url(#t2)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="150" y="268" fill="#F5A623" font-size="11" letter-spacing="2">TIER 2 · BOUNDED BLAST RADIUS</text>
    <text x="150" y="298" fill="#e6edf3" font-size="14" font-weight="700">API keys in the credentials vault</text>
    <text x="150" y="320" fill="#9aa4b2" font-size="11">OPENAI_API_KEY · OPENAGENTS_SPARK_API_KEY · BLINK_API_KEY · custom</text>
    <text x="150" y="340" fill="#7d8493" font-size="10">if lost: whatever the upstream provider lets the key do — drain a remote balance, exfil prompts</text>
    <text x="150" y="356" fill="#7d8493" font-size="10">discipline: scope narrowly (CODEX/SPARK/SKILLS, not GLOBAL) · keychain over env · disable, don't delete</text>
  </g>

  <!-- Tier 3: Sessions (smallest, blue) -->
  <g>
    <rect x="180" y="390" width="560" height="100" rx="8" fill="url(#t3)" stroke="#7aa6ff" stroke-width="1"/>
    <text x="210" y="418" fill="#7aa6ff" font-size="11" letter-spacing="2">TIER 3 · LOW BLAST RADIUS</text>
    <text x="210" y="446" fill="#e6edf3" font-size="14" font-weight="700">Session tokens · ephemeral relay subs</text>
    <text x="210" y="466" fill="#7d8493" font-size="10">if lost: limited damage · cycle them and move on</text>
    <text x="210" y="480" fill="#7d8493" font-size="10">discipline: rotate often · don't be sentimental</text>
  </g>

  <!-- Footer -->
  <text x="460" y="520" fill="#7d8493" font-size="10" text-anchor="middle">custody is the discipline · sovereignty is what you get when you keep it</text>
</svg>
