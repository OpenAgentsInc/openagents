<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0d10"/>
      <stop offset="1" stop-color="#14181d"/>
    </linearGradient>
    <linearGradient id="wedge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5A623"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="market" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2530"/>
      <stop offset="1" stop-color="#151a22"/>
    </linearGradient>
    <linearGradient id="kernel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#273040"/>
      <stop offset="1" stop-color="#1a2130"/>
    </linearGradient>
    <linearGradient id="sub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1420"/>
      <stop offset="1" stop-color="#060a10"/>
    </linearGradient>
  </defs>

  <rect width="900" height="620" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="36" fill="#e6edf3" font-size="16" text-anchor="middle" letter-spacing="2">\\  OPENAGENTS MARKETPLACE STACK</text>

  <!-- Autopilot wedge -->
  <rect x="300" y="60" width="300" height="60" rx="6" fill="url(#wedge)" stroke="#E9A03A" stroke-width="1"/>
  <text x="450" y="87" fill="#1a1306" font-size="16" text-anchor="middle" font-weight="700">AUTOPILOT</text>
  <text x="450" y="107" fill="#2a1e0a" font-size="11" text-anchor="middle">desktop wedge  ·  one-click earn loop</text>

  <!-- five markets -->
  <g>
    <rect x="40"  y="160" width="150" height="90" rx="6" fill="url(#market)" stroke="#3a4558" stroke-width="1"/>
    <text x="115" y="188" fill="#e6edf3" font-size="13" text-anchor="middle" font-weight="700">COMPUTE</text>
    <text x="115" y="208" fill="#9aa4b2" font-size="11" text-anchor="middle">Pylon + Nexus</text>
    <text x="115" y="224" fill="#7d8493" font-size="10" text-anchor="middle">CS336 A1 · 25 sats</text>
    <text x="115" y="240" fill="#7d8493" font-size="10" text-anchor="middle">paid training lane</text>

    <rect x="205" y="160" width="150" height="90" rx="6" fill="url(#market)" stroke="#3a4558" stroke-width="1"/>
    <text x="280" y="188" fill="#e6edf3" font-size="13" text-anchor="middle" font-weight="700">DATA</text>
    <text x="280" y="208" fill="#9aa4b2" font-size="11" text-anchor="middle">NIP-90 5960/6960/31990</text>
    <text x="280" y="224" fill="#7d8493" font-size="10" text-anchor="middle">damus · primal relays</text>
    <text x="280" y="240" fill="#7d8493" font-size="10" text-anchor="middle">open handler registry</text>

    <rect x="370" y="160" width="150" height="90" rx="6" fill="url(#market)" stroke="#3a4558" stroke-width="1"/>
    <text x="445" y="188" fill="#e6edf3" font-size="13" text-anchor="middle" font-weight="700">LABOR</text>
    <text x="445" y="208" fill="#9aa4b2" font-size="11" text-anchor="middle">Forge + Probe</text>
    <text x="445" y="224" fill="#7d8493" font-size="10" text-anchor="middle">dev bounties</text>
    <text x="445" y="240" fill="#7d8493" font-size="10" text-anchor="middle">paid contributor work</text>

    <rect x="535" y="160" width="150" height="90" rx="6" fill="url(#market)" stroke="#3a4558" stroke-width="1"/>
    <text x="610" y="188" fill="#e6edf3" font-size="13" text-anchor="middle" font-weight="700">LIQUIDITY</text>
    <text x="610" y="208" fill="#9aa4b2" font-size="11" text-anchor="middle">TreasuryRouter</text>
    <text x="610" y="224" fill="#7d8493" font-size="10" text-anchor="middle">Spark · Lightning</text>
    <text x="610" y="240" fill="#7d8493" font-size="10" text-anchor="middle">accepted-work payouts</text>

    <rect x="700" y="160" width="150" height="90" rx="6" fill="url(#market)" stroke="#3a4558" stroke-width="1"/>
    <text x="775" y="188" fill="#e6edf3" font-size="13" text-anchor="middle" font-weight="700">RISK</text>
    <text x="775" y="208" fill="#9aa4b2" font-size="11" text-anchor="middle">underwriting layer</text>
    <text x="775" y="224" fill="#7d8493" font-size="10" text-anchor="middle">roadmap · kernel-signed</text>
    <text x="775" y="240" fill="#7d8493" font-size="10" text-anchor="middle">risk receipts</text>
  </g>

  <!-- connectors wedge -> markets -->
  <g stroke="#4b5566" stroke-width="1" fill="none">
    <line x1="450" y1="120" x2="115" y2="160"/>
    <line x1="450" y1="120" x2="280" y2="160"/>
    <line x1="450" y1="120" x2="445" y2="160"/>
    <line x1="450" y1="120" x2="610" y2="160"/>
    <line x1="450" y1="120" x2="775" y2="160"/>
  </g>

  <!-- Economy Kernel -->
  <rect x="120" y="300" width="660" height="80" rx="6" fill="url(#kernel)" stroke="#3a4558" stroke-width="1"/>
  <text x="450" y="328" fill="#e6edf3" font-size="14" text-anchor="middle" font-weight="700">ECONOMY KERNEL</text>
  <text x="450" y="349" fill="#9aa4b2" font-size="11" text-anchor="middle">sv control loop  ·  Nexus  ·  ADR-0001 authority lanes</text>
  <text x="450" y="367" fill="#7d8493" font-size="11" text-anchor="middle">signed receipts  ·  verifiable outcomes under uncertainty</text>

  <!-- connectors markets -> kernel -->
  <g stroke="#4b5566" stroke-width="1" fill="none">
    <line x1="115" y1="250" x2="200" y2="300"/>
    <line x1="280" y1="250" x2="310" y2="300"/>
    <line x1="445" y1="250" x2="450" y2="300"/>
    <line x1="610" y1="250" x2="590" y2="300"/>
    <line x1="775" y1="250" x2="700" y2="300"/>
  </g>

  <!-- Substrate -->
  <rect x="40" y="430" width="820" height="130" rx="6" fill="url(#sub)" stroke="#2a3242" stroke-width="1"/>
  <text x="450" y="456" fill="#e6edf3" font-size="13" text-anchor="middle" letter-spacing="2">\\  SUBSTRATE</text>

  <g font-size="12" text-anchor="middle">
    <rect x="80" y="475" width="170" height="60" rx="4" fill="#0d1420" stroke="#2a3242"/>
    <text x="165" y="498" fill="#F7931A" font-weight="700">BITCOIN</text>
    <text x="165" y="518" fill="#7d8493" font-size="10">settlement currency</text>

    <rect x="270" y="475" width="170" height="60" rx="4" fill="#0d1420" stroke="#2a3242"/>
    <text x="355" y="498" fill="#FFCD4B" font-weight="700">LIGHTNING</text>
    <text x="355" y="518" fill="#7d8493" font-size="10">wallet rails</text>

    <rect x="460" y="475" width="170" height="60" rx="4" fill="#0d1420" stroke="#2a3242"/>
    <text x="545" y="498" fill="#CA6BFF" font-weight="700">NOSTR</text>
    <text x="545" y="518" fill="#7d8493" font-size="10">NIP-90 · open relays</text>

    <rect x="650" y="475" width="170" height="60" rx="4" fill="#0d1420" stroke="#2a3242"/>
    <text x="735" y="498" fill="#4BA3FF" font-weight="700">SPACETIME</text>
    <text x="735" y="518" fill="#7d8493" font-size="10">sync + presence</text>
  </g>

  <!-- connectors kernel -> substrate -->
  <g stroke="#4b5566" stroke-width="1" fill="none">
    <line x1="250" y1="380" x2="165" y2="475"/>
    <line x1="360" y1="380" x2="355" y2="475"/>
    <line x1="540" y1="380" x2="545" y2="475"/>
    <line x1="650" y1="380" x2="735" y2="475"/>
  </g>

  <!-- Footer -->
  <text x="450" y="595" fill="#5a6271" font-size="10" text-anchor="middle" letter-spacing="1">one kernel · five markets · bitcoin rails · open protocol</text>
</svg>
