<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0d10"/>
      <stop offset="1" stop-color="#14181d"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2530"/>
      <stop offset="1" stop-color="#151a22"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#F5A623"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="url(#bg)"/>

  <text x="450" y="36" fill="#e6edf3" font-size="16" text-anchor="middle" letter-spacing="2">\\  sv CONTROL LOOP</text>
  <text x="450" y="58" fill="#7d8493" font-size="11" text-anchor="middle">verification → receipts → policy → autonomy throttle</text>

  <!-- nodes around a circle -->
  <!-- WORK (12 o'clock) -->
  <g>
    <rect x="370" y="90" width="160" height="80" rx="6" fill="url(#node)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="450" y="120" fill="#F5A623" font-size="14" text-anchor="middle" font-weight="700">1. WORK</text>
    <text x="450" y="140" fill="#9aa4b2" font-size="11" text-anchor="middle">provider executes</text>
    <text x="450" y="156" fill="#7d8493" font-size="10" text-anchor="middle">Pylon · Psionic · homework run</text>
  </g>

  <!-- VERIFY (3 o'clock) -->
  <g>
    <rect x="660" y="240" width="190" height="80" rx="6" fill="url(#node)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="755" y="270" fill="#F5A623" font-size="14" text-anchor="middle" font-weight="700">2. VERIFY</text>
    <text x="755" y="290" fill="#9aa4b2" font-size="11" text-anchor="middle">independent validator</text>
    <text x="755" y="306" fill="#7d8493" font-size="10" text-anchor="middle">validator Pylon · closeout</text>
  </g>

  <!-- RECEIPT (5 o'clock) -->
  <g>
    <rect x="520" y="400" width="200" height="80" rx="6" fill="url(#node)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="620" y="430" fill="#F5A623" font-size="14" text-anchor="middle" font-weight="700">3. RECEIPT</text>
    <text x="620" y="450" fill="#9aa4b2" font-size="11" text-anchor="middle">kernel-signed artifact</text>
    <text x="620" y="466" fill="#7d8493" font-size="10" text-anchor="middle">Treasury payout · wallet delta</text>
  </g>

  <!-- POLICY (7 o'clock) -->
  <g>
    <rect x="180" y="400" width="200" height="80" rx="6" fill="url(#node)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="280" y="430" fill="#F5A623" font-size="14" text-anchor="middle" font-weight="700">4. POLICY</text>
    <text x="280" y="450" fill="#9aa4b2" font-size="11" text-anchor="middle">autonomy + risk update</text>
    <text x="280" y="466" fill="#7d8493" font-size="10" text-anchor="middle">budgets · rate limits · caps</text>
  </g>

  <!-- THROTTLE (9 o'clock) -->
  <g>
    <rect x="50" y="240" width="190" height="80" rx="6" fill="url(#node)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="145" y="270" fill="#F5A623" font-size="14" text-anchor="middle" font-weight="700">5. THROTTLE</text>
    <text x="145" y="290" fill="#9aa4b2" font-size="11" text-anchor="middle">autonomy admitted</text>
    <text x="145" y="306" fill="#7d8493" font-size="10" text-anchor="middle">6,400 sat cap/cycle</text>
  </g>

  <!-- arrows: work->verify->receipt->policy->throttle->work -->
  <g fill="none" stroke="#F5A623" stroke-width="2" marker-end="url(#arrow)">
    <path d="M 530 130 Q 660 170 700 240"/>
    <path d="M 720 320 Q 680 400 620 400"/>
    <path d="M 520 440 Q 420 450 380 440"/>
    <path d="M 180 400 Q 120 360 140 320"/>
    <path d="M 180 240 Q 250 170 370 130"/>
  </g>

  <!-- kernel inside circle -->
  <g>
    <rect x="350" y="245" width="200" height="70" rx="6" fill="#1a2130" stroke="#3a4558" stroke-width="1"/>
    <text x="450" y="273" fill="#e6edf3" font-size="13" text-anchor="middle" font-weight="700">ECONOMY KERNEL</text>
    <text x="450" y="292" fill="#7d8493" font-size="10" text-anchor="middle">verifiable outcomes under uncertainty</text>
    <text x="450" y="306" fill="#7d8493" font-size="10" text-anchor="middle">ADR-0001 authority model</text>
  </g>

  <text x="450" y="535" fill="#5a6271" font-size="10" text-anchor="middle" letter-spacing="1">every loop iteration = one settled sat · one signed receipt · one policy delta</text>
</svg>
