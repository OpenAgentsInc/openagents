<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0d10"/>
      <stop offset="1" stop-color="#14181d"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2820"/>
      <stop offset="1" stop-color="#101c14"/>
    </linearGradient>
    <linearGradient id="stall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2812"/>
      <stop offset="1" stop-color="#1f1607"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#F5A623"/>
    </marker>
  </defs>

  <rect width="980" height="420" fill="url(#bg)"/>

  <text x="490" y="32" fill="#e6edf3" font-size="16" text-anchor="middle" letter-spacing="2">WHERE THE LOOP STALLS</text>
  <text x="490" y="54" fill="#7d8493" font-size="11" text-anchor="middle">six lifecycle states · common failure modes mapped to each</text>

  <!-- 6 horizontal nodes (compact) -->
  <g>
    <rect x="40"  y="120" width="140" height="60" rx="6" fill="url(#ok)" stroke="#9bd99b" stroke-width="1.2"/>
    <text x="110" y="142" fill="#9bd99b" font-size="11" text-anchor="middle" font-weight="700">1. invoice_</text>
    <text x="110" y="156" fill="#9bd99b" font-size="11" text-anchor="middle" font-weight="700">requested</text>
    <text x="110" y="172" fill="#7d8493" font-size="9" text-anchor="middle">5960 ingested</text>

    <rect x="200" y="120" width="140" height="60" rx="6" fill="url(#ok)" stroke="#9bd99b" stroke-width="1.2"/>
    <text x="270" y="142" fill="#9bd99b" font-size="11" text-anchor="middle" font-weight="700">2. publishing_</text>
    <text x="270" y="156" fill="#9bd99b" font-size="11" text-anchor="middle" font-weight="700">feedback</text>
    <text x="270" y="172" fill="#7d8493" font-size="9" text-anchor="middle">payment-required</text>

    <rect x="360" y="120" width="140" height="60" rx="6" fill="url(#stall)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="430" y="142" fill="#F5A623" font-size="11" text-anchor="middle" font-weight="700">3. awaiting_</text>
    <text x="430" y="156" fill="#F5A623" font-size="11" text-anchor="middle" font-weight="700">payment</text>
    <text x="430" y="172" fill="#7d8493" font-size="9" text-anchor="middle">most common stall</text>

    <rect x="520" y="120" width="140" height="60" rx="6" fill="url(#ok)" stroke="#9bd99b" stroke-width="1.2"/>
    <text x="590" y="148" fill="#9bd99b" font-size="11" text-anchor="middle" font-weight="700">4. paid</text>
    <text x="590" y="172" fill="#7d8493" font-size="9" text-anchor="middle">⚡ settled</text>

    <rect x="680" y="120" width="140" height="60" rx="6" fill="url(#ok)" stroke="#9bd99b" stroke-width="1.2"/>
    <text x="750" y="148" fill="#9bd99b" font-size="11" text-anchor="middle" font-weight="700">5. delivery</text>
    <text x="750" y="172" fill="#7d8493" font-size="9" text-anchor="middle">bundle minted</text>

    <rect x="840" y="120" width="140" height="60" rx="6" fill="url(#ok)" stroke="#9bd99b" stroke-width="1.2"/>
    <text x="910" y="148" fill="#9bd99b" font-size="11" text-anchor="middle" font-weight="700">6. revocation</text>
    <text x="910" y="172" fill="#7d8493" font-size="9" text-anchor="middle">closed signed</text>

    <line x1="180" y1="150" x2="200" y2="150" stroke="#F5A623" stroke-width="1" marker-end="url(#arr)"/>
    <line x1="340" y1="150" x2="360" y2="150" stroke="#F5A623" stroke-width="1" marker-end="url(#arr)"/>
    <line x1="500" y1="150" x2="520" y2="150" stroke="#F5A623" stroke-width="1" marker-end="url(#arr)"/>
    <line x1="660" y1="150" x2="680" y2="150" stroke="#F5A623" stroke-width="1" marker-end="url(#arr)"/>
    <line x1="820" y1="150" x2="840" y2="150" stroke="#F5A623" stroke-width="1" marker-end="url(#arr)"/>
  </g>

  <!-- Common stalls table -->
  <text x="40" y="230" fill="#F5A623" font-size="11" letter-spacing="2">COMMON STALLS</text>

  <g font-size="10">
    <text x="40"  y="258" fill="#9aa4b2">Pylon won't start</text>
    <text x="280" y="258" fill="#7d8493">→ identity.mnemonic missing / empty / wrong perms / path drift</text>
    <text x="40"  y="278" fill="#9aa4b2">Online but no jobs</text>
    <text x="280" y="278" fill="#7d8493">→ relay reachability · 31990 not on relays · genuine demand gap</text>
    <text x="40"  y="298" fill="#9aa4b2">Stuck at state 3</text>
    <text x="280" y="298" fill="#7d8493">→ buyer never paid the invoice (NORMAL — lifecycle aborts cleanly)</text>
    <text x="40"  y="318" fill="#9aa4b2">Job done, wallet flat</text>
    <text x="280" y="318" fill="#7d8493">→ check kernel-signed DeliveryBundle · trust kernel state over panes/logs</text>
    <text x="40"  y="338" fill="#9aa4b2">Withdrawal stuck</text>
    <text x="280" y="338" fill="#7d8493">→ invoice expired · no path · v0.1 is Regtest only (not Testnet/mainnet)</text>
    <text x="40"  y="358" fill="#9aa4b2">Credential not picked up</text>
    <text x="280" y="358" fill="#7d8493">→ enabled flag · scope mismatch (CODEX/SPARK/SKILLS/GLOBAL routing)</text>
    <text x="40"  y="378" fill="#9aa4b2">Two agents collided</text>
    <text x="280" y="378" fill="#7d8493">→ shared HOME — isolate by HOME=/path/to/agent-X</text>
  </g>

  <text x="490" y="408" fill="#7d8493" font-size="10" text-anchor="middle">authoritative truth = signed kernel events · everything else is a projection</text>
</svg>
