<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 580" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0d10"/>
      <stop offset="1" stop-color="#14181d"/>
    </linearGradient>
    <linearGradient id="layer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1f28"/>
      <stop offset="1" stop-color="#10141a"/>
    </linearGradient>
    <linearGradient id="vehicle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22282f"/>
      <stop offset="1" stop-color="#171c22"/>
    </linearGradient>
  </defs>

  <rect width="980" height="580" fill="url(#bg)"/>

  <text x="490" y="32" fill="#e6edf3" font-size="16" text-anchor="middle" letter-spacing="2">TERRAIN · VEHICLES · DRIVERS</text>
  <text x="490" y="54" fill="#7d8493" font-size="11" text-anchor="middle">what you're operating on, what you operate it with, who's at the wheel</text>

  <!-- DRIVERS (top) -->
  <g>
    <text x="80" y="100" fill="#F5A623" font-size="11" letter-spacing="2">DRIVERS</text>

    <rect x="80" y="120" width="380" height="78" rx="6" fill="url(#vehicle)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="270" y="148" fill="#e6edf3" font-size="13" text-anchor="middle" font-weight="700">Human</text>
    <text x="270" y="170" fill="#9aa4b2" font-size="10" text-anchor="middle">desktop pane · TUI · CLI</text>
    <text x="270" y="186" fill="#7d8493" font-size="9" text-anchor="middle">click-to-drive · watches the wallet tick</text>

    <rect x="520" y="120" width="380" height="78" rx="6" fill="url(#vehicle)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="710" y="148" fill="#e6edf3" font-size="13" text-anchor="middle" font-weight="700">Agentic</text>
    <text x="710" y="170" fill="#9aa4b2" font-size="10" text-anchor="middle">headless · autonomous · isolated HOME</text>
    <text x="710" y="186" fill="#7d8493" font-size="9" text-anchor="middle">own keys · own wallet · capped withdrawals</text>
  </g>

  <!-- VEHICLES (middle) -->
  <g>
    <text x="80" y="240" fill="#F5A623" font-size="11" letter-spacing="2">VEHICLES</text>

    <rect x="80" y="260" width="380" height="78" rx="6" fill="url(#vehicle)" stroke="#F5A623" stroke-width="1.5"/>
    <text x="270" y="288" fill="#F5A623" font-size="13" text-anchor="middle" font-weight="700">Pylon</text>
    <text x="270" y="310" fill="#9aa4b2" font-size="10" text-anchor="middle">narrow supply connector · CLI · works today</text>
    <text x="270" y="326" fill="#7d8493" font-size="9" text-anchor="middle">cargo pylon · npx @openagentsinc/pylon</text>

    <rect x="520" y="260" width="380" height="78" rx="6" fill="url(#vehicle)" stroke="#3d4654" stroke-width="1.2"/>
    <text x="710" y="288" fill="#e6edf3" font-size="13" text-anchor="middle" font-weight="700">Autopilot</text>
    <text x="710" y="310" fill="#9aa4b2" font-size="10" text-anchor="middle">desktop wrapper · ships for Vegas 2026</text>
    <text x="710" y="326" fill="#7d8493" font-size="9" text-anchor="middle">panes · wallet · credentials vault</text>
  </g>

  <!-- TERRAIN (bottom three layers) -->
  <g>
    <text x="80" y="380" fill="#F5A623" font-size="11" letter-spacing="2">TERRAIN</text>

    <rect x="80" y="400" width="820" height="50" rx="6" fill="url(#layer)" stroke="#7aa6ff" stroke-width="1"/>
    <text x="100" y="424" fill="#7aa6ff" font-size="12" font-weight="700">Nostr</text>
    <text x="100" y="438" fill="#7d8493" font-size="9">public message bus</text>
    <text x="490" y="424" fill="#9aa4b2" font-size="10" text-anchor="middle">identity · capability ads · job requests · signed results</text>
    <text x="880" y="438" fill="#7d8493" font-size="9" text-anchor="end">you + the relays you choose</text>

    <rect x="80" y="458" width="820" height="50" rx="6" fill="url(#layer)" stroke="#f7c93e" stroke-width="1"/>
    <text x="100" y="482" fill="#f7c93e" font-size="12" font-weight="700">⚡ Lightning</text>
    <text x="100" y="496" fill="#7d8493" font-size="9">settlement layer</text>
    <text x="490" y="482" fill="#9aa4b2" font-size="10" text-anchor="middle">sats move buyer→provider in seconds, no custodian</text>
    <text x="880" y="496" fill="#7d8493" font-size="9" text-anchor="end">you + your wallet</text>

    <rect x="80" y="516" width="820" height="50" rx="6" fill="url(#layer)" stroke="#9bd99b" stroke-width="1"/>
    <text x="100" y="540" fill="#9bd99b" font-size="12" font-weight="700">Economy Kernel</text>
    <text x="100" y="554" fill="#7d8493" font-size="9">local trust engine</text>
    <text x="490" y="540" fill="#9aa4b2" font-size="10" text-anchor="middle">mints AccessGrants · DeliveryBundles · RevocationReceipts</text>
    <text x="880" y="554" fill="#7d8493" font-size="9" text-anchor="end">you — runs on your machine</text>
  </g>
</svg>
