packages:
  - apps/openagents.com
  - apps/openagents.com/apps/*
  - apps/openagents.com/packages/*
  - apps/openagents.com/services/*
  - apps/openagents.com/workers/*
  - apps/acceptance-runner
  - apps/qa-runner
  - apps/aiur
  - apps/forum
  - apps/khala-capture
  - apps/khala-live-hub
  - apps/oa-queue-worker
  - apps/oa-updates
  - apps/openagents-mobile
  - apps/openagents-audio
  - apps/openagents-audio-edge
  - apps/openagents-desktop
  - apps/pylon
  - apps/pylon/packages/*
  - packages/*
  - packages/probe
  - packages/probe/packages/*
  - types/*
  - apps/ai-sdk-harness-poc
  - apps/electron-ai-sdk-test

publicHoistPattern:
  - "*electron*"
  - fs-xattr
  - macos-alias

# Electron Forge currently resolves its maintained node-gyp fork from Git.
blockExoticSubdeps: false

catalog:
  "@effect/openapi-generator": 4.0.0-beta.94
  "@effect/platform-node": 4.0.0-beta.94
  "@types/node": 24.13.1
  effect: 4.0.0-beta.94
  typescript: ^6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@0.2.4
  vite-plus: 0.2.4

allowBuilds:
  "@electron/node-gyp": true
  "@openrouter/sdk": false
  "@shopify/react-native-skia": true
  electron: true
  esbuild: true
  fs-xattr: true
  macos-alias: true
  msgpackr-extract: true
  onnxruntime-node: true
  protobufjs: true
  sharp: true
  "@electron/node-gyp@https://codeload.github.com/electron/node-gyp/tar.gz/06b29aafb7708acef8b3669835c8a7857ebc92d2": true
  nostr-effect@https://codeload.github.com/OpenAgentsInc/nostr-effect/tar.gz/2bb57870eeeb214ed80ca8a275292f5e4dd89863: false
  nostr-effect@https://github.com/OpenAgentsInc/nostr-effect/archive/2bb57870eeeb214ed80ca8a275292f5e4dd89863.tar.gz: false
  # app-builder-lib carries the Windows installer helper as an optional peer;
  # Linux AppImage generation never executes its install script.
  electron-winstaller: false
  '@google/genai': set this to true or false

overrides:
  "@effect/platform-browser": 4.0.0-beta.94
  "@effect/sql-pg": 4.0.0-beta.94
  "@types/node": "catalog:"
  effect: "catalog:"
  vite: "catalog:"

packageExtensions:
  vite-plus@*:
    dependencies:
      vite: "catalog:"

patchedDependencies:
  electron-installer-common@0.10.4: patches/electron-installer-common@0.10.4.patch
  electron-installer-redhat@3.4.0: patches/electron-installer-redhat@3.4.0.patch
  foldkit@0.102.1: patches/foldkit@0.102.1.patch

peerDependencyRules:
  allowAny:
    - vite

supportedArchitectures:
  cpu: [ current, x64 ]
  libc: [ current, glibc ]
  os: [ current, linux ]

minimumReleaseAgeExclude:
  - blume@1.0.4
  - "@ai-sdk/gateway@4.0.23"
  - "@ai-sdk/harness-codex@1.0.38"
  - "@ai-sdk/harness@1.0.36"
  - "@ai-sdk/provider-utils@5.0.11"
  - ai@7.0.31
  - "@ai-sdk/mcp@2.0.15"
  - "@ai-sdk/react@4.0.34"
  - "@ai-sdk/harness-claude-code@1.0.37"
  - "@openagentsinc/agent-harness-contract@0.1.3-rc.1 || 0.2.0-rc.1 || 0.2.0-rc.2 || 0.2.0-rc.4 || 0.2.0-rc.5 || 0.2.0-rc.6 || 0.2.0-rc.7 || 0.2.1-rc.2 || 0.2.1-rc.3 || 0.2.1-rc.4"
  - "@openagentsinc/agent-runtime-schema@0.1.3-rc.1 || 0.2.0-rc.1 || 0.2.0-rc.2 || 0.2.0-rc.4 || 0.2.0-rc.5 || 0.2.0-rc.6 || 0.2.0-rc.7 || 0.2.1-rc.2 || 0.2.1-rc.3 || 0.2.1-rc.4"
  - "@openagentsinc/ai@0.2.0-rc.1 || 0.2.0-rc.2 || 0.2.0-rc.4 || 0.2.0-rc.5 || 0.2.0-rc.6 || 0.2.0-rc.7 || 0.2.1-rc.2 || 0.2.1-rc.3 || 0.2.1-rc.4"
  - "@openagentsinc/ai-sdk-sandbox-local@0.1.3-rc.1 || 0.2.0-rc.4 || 0.2.0-rc.5 || 0.2.0-rc.6 || 0.2.0-rc.7 || 0.2.1-rc.2 || 0.2.1-rc.3 || 0.2.1-rc.4"
  - "@openagentsinc/history-corpus@0.1.3-rc.1 || 0.2.0-rc.1 || 0.2.0-rc.2 || 0.2.0-rc.4 || 0.2.0-rc.5 || 0.2.0-rc.6 || 0.2.0-rc.7 || 0.2.1-rc.2 || 0.2.1-rc.3 || 0.2.1-rc.4"
  - "@openagentsinc/rlm@0.2.0-rc.1 || 0.2.0-rc.2 || 0.2.0-rc.4 || 0.2.0-rc.5 || 0.2.0-rc.6 || 0.2.0-rc.7 || 0.2.1-rc.2 || 0.2.1-rc.3 || 0.2.1-rc.4"
  - "@openagentsinc/ai-model@0.2.0-rc.1 || 0.2.0-rc.2 || 0.2.0-rc.4 || 0.2.0-rc.5 || 0.2.0-rc.6 || 0.2.0-rc.7 || 0.2.1-rc.2 || 0.2.1-rc.3 || 0.2.1-rc.4"
  - "@openagentsinc/dse@0.2.0-rc.4 || 0.2.0-rc.5 || 0.2.0-rc.6 || 0.2.0-rc.7 || 0.2.1-rc.2 || 0.2.1-rc.3 || 0.2.1-rc.4"
  - "@openagentsinc/graph-corpus@0.2.0-rc.4 || 0.2.0-rc.5 || 0.2.0-rc.6 || 0.2.0-rc.7 || 0.2.1-rc.2 || 0.2.1-rc.3 || 0.2.1-rc.4"
  - "@openagentsinc/conformance-kit@0.2.1-rc.2 || 0.2.1-rc.3 || 0.2.1-rc.4"
