syntax = "proto3";

package openagents.compute.v1;

import "openagents/common/v1/common.proto";
import "openagents/economy/v1/receipt.proto";
import "openagents/compute/v1/compute_products.proto";

enum CapacityInstrumentKind {
  CAPACITY_INSTRUMENT_KIND_UNSPECIFIED = 0;
  CAPACITY_INSTRUMENT_KIND_SPOT = 1;
  CAPACITY_INSTRUMENT_KIND_FORWARD_PHYSICAL = 2;
  CAPACITY_INSTRUMENT_KIND_FUTURE_CASH = 3;
  CAPACITY_INSTRUMENT_KIND_RESERVATION = 4;
}

enum CapacityInstrumentStatus {
  CAPACITY_INSTRUMENT_STATUS_UNSPECIFIED = 0;
  CAPACITY_INSTRUMENT_STATUS_OPEN = 1;
  CAPACITY_INSTRUMENT_STATUS_ACTIVE = 2;
  CAPACITY_INSTRUMENT_STATUS_DELIVERING = 3;
  CAPACITY_INSTRUMENT_STATUS_CASH_SETTLING = 4;
  CAPACITY_INSTRUMENT_STATUS_SETTLED = 5;
  CAPACITY_INSTRUMENT_STATUS_DEFAULTED = 6;
  CAPACITY_INSTRUMENT_STATUS_CANCELLED = 7;
  CAPACITY_INSTRUMENT_STATUS_EXPIRED = 8;
}

enum StructuredCapacityInstrumentKind {
  STRUCTURED_CAPACITY_INSTRUMENT_KIND_UNSPECIFIED = 0;
  STRUCTURED_CAPACITY_INSTRUMENT_KIND_RESERVATION = 1;
  STRUCTURED_CAPACITY_INSTRUMENT_KIND_SWAP = 2;
  STRUCTURED_CAPACITY_INSTRUMENT_KIND_STRIP = 3;
}

enum StructuredCapacityInstrumentStatus {
  STRUCTURED_CAPACITY_INSTRUMENT_STATUS_UNSPECIFIED = 0;
  STRUCTURED_CAPACITY_INSTRUMENT_STATUS_OPEN = 1;
  STRUCTURED_CAPACITY_INSTRUMENT_STATUS_ACTIVE = 2;
  STRUCTURED_CAPACITY_INSTRUMENT_STATUS_PARTIALLY_CLOSED = 3;
  STRUCTURED_CAPACITY_INSTRUMENT_STATUS_SETTLED = 4;
  STRUCTURED_CAPACITY_INSTRUMENT_STATUS_DEFAULTED = 5;
  STRUCTURED_CAPACITY_INSTRUMENT_STATUS_CANCELLED = 6;
  STRUCTURED_CAPACITY_INSTRUMENT_STATUS_EXPIRED = 7;
}

enum StructuredCapacityLegRole {
  STRUCTURED_CAPACITY_LEG_ROLE_UNSPECIFIED = 0;
  STRUCTURED_CAPACITY_LEG_ROLE_RESERVATION_RIGHT = 1;
  STRUCTURED_CAPACITY_LEG_ROLE_SWAP_PAY = 2;
  STRUCTURED_CAPACITY_LEG_ROLE_SWAP_RECEIVE = 3;
  STRUCTURED_CAPACITY_LEG_ROLE_STRIP_SEGMENT = 4;
}

enum CapacityInstrumentClosureReason {
  CAPACITY_INSTRUMENT_CLOSURE_REASON_UNSPECIFIED = 0;
  CAPACITY_INSTRUMENT_CLOSURE_REASON_FILLED = 1;
  CAPACITY_INSTRUMENT_CLOSURE_REASON_BUYER_CANCELLED = 2;
  CAPACITY_INSTRUMENT_CLOSURE_REASON_PROVIDER_CANCELLED = 3;
  CAPACITY_INSTRUMENT_CLOSURE_REASON_CURTAILED = 4;
  CAPACITY_INSTRUMENT_CLOSURE_REASON_EXPIRED = 5;
  CAPACITY_INSTRUMENT_CLOSURE_REASON_DEFAULTED = 6;
}

enum CapacityNonDeliveryReason {
  CAPACITY_NON_DELIVERY_REASON_UNSPECIFIED = 0;
  CAPACITY_NON_DELIVERY_REASON_PROVIDER_OFFLINE = 1;
  CAPACITY_NON_DELIVERY_REASON_CAPABILITY_MISMATCH = 2;
  CAPACITY_NON_DELIVERY_REASON_POLICY_BLOCKED = 3;
  CAPACITY_NON_DELIVERY_REASON_MISSED_WINDOW = 4;
}

enum ComputeSettlementFailureReason {
  COMPUTE_SETTLEMENT_FAILURE_REASON_UNSPECIFIED = 0;
  COMPUTE_SETTLEMENT_FAILURE_REASON_PAYMENT_TIMEOUT = 1;
  COMPUTE_SETTLEMENT_FAILURE_REASON_RECEIPT_REJECTED = 2;
  COMPUTE_SETTLEMENT_FAILURE_REASON_NON_DELIVERY = 3;
  COMPUTE_SETTLEMENT_FAILURE_REASON_COST_ATTESTATION_MISSING = 4;
  COMPUTE_SETTLEMENT_FAILURE_REASON_ADJUDICATION_REQUIRED = 5;
}

message CapacityInstrument {
  string instrument_id = 1;
  string product_id = 2;
  optional string capacity_lot_id = 3;
  optional string buyer_id = 4;
  optional string provider_id = 5;
  int64 delivery_start_ms = 6;
  int64 delivery_end_ms = 7;
  uint64 quantity = 8;
  optional openagents.common.v1.Money fixed_price = 9;
  optional string reference_index_id = 10;
  CapacityInstrumentKind kind = 11;
  ComputeSettlementMode settlement_mode = 12;
  int64 created_at_ms = 13;
  CapacityInstrumentStatus status = 14;
  optional ComputeEnvironmentBinding environment_binding = 15;
  CapacityInstrumentClosureReason closure_reason = 16;
  CapacityNonDeliveryReason non_delivery_reason = 17;
  ComputeSettlementFailureReason settlement_failure_reason = 18;
  optional string lifecycle_reason_detail = 19;
  string metadata_json = 20;
}

message StructuredCapacityLeg {
  string instrument_id = 1;
  StructuredCapacityLegRole role = 2;
  uint32 leg_order = 3;
  string metadata_json = 4;
}

message StructuredCapacityInstrument {
  string structured_instrument_id = 1;
  string product_id = 2;
  optional string buyer_id = 3;
  optional string provider_id = 4;
  StructuredCapacityInstrumentKind kind = 5;
  int64 created_at_ms = 6;
  StructuredCapacityInstrumentStatus status = 7;
  optional string lifecycle_reason_detail = 8;
  repeated StructuredCapacityLeg legs = 9;
  string metadata_json = 10;
}

message CreateCapacityInstrumentRequest {
  string idempotency_key = 1;
  openagents.common.v1.TraceContext trace = 2;
  openagents.common.v1.PolicyContext policy = 3;
  CapacityInstrument instrument = 4;
  repeated openagents.common.v1.EvidenceRef evidence = 5;
  openagents.economy.v1.ReceiptHints hints = 6;
}

message CreateCapacityInstrumentResponse {
  CapacityInstrument instrument = 1;
  openagents.economy.v1.Receipt receipt = 2;
}

message ListCapacityInstrumentsRequest {
  optional string product_id = 1;
  optional string capacity_lot_id = 2;
  CapacityInstrumentStatus status = 3;
}

message ListCapacityInstrumentsResponse {
  repeated CapacityInstrument instruments = 1;
}

message GetCapacityInstrumentRequest {
  string instrument_id = 1;
}

message GetCapacityInstrumentResponse {
  CapacityInstrument instrument = 1;
}

message CloseCapacityInstrumentRequest {
  string idempotency_key = 1;
  openagents.common.v1.TraceContext trace = 2;
  openagents.common.v1.PolicyContext policy = 3;
  string instrument_id = 4;
  CapacityInstrumentStatus status = 5;
  int64 closed_at_ms = 6;
  CapacityInstrumentClosureReason closure_reason = 7;
  CapacityNonDeliveryReason non_delivery_reason = 8;
  ComputeSettlementFailureReason settlement_failure_reason = 9;
  optional string lifecycle_reason_detail = 10;
  string metadata_json = 11;
  repeated openagents.common.v1.EvidenceRef evidence = 12;
  openagents.economy.v1.ReceiptHints hints = 13;
}

message CloseCapacityInstrumentResponse {
  CapacityInstrument instrument = 1;
  openagents.economy.v1.Receipt receipt = 2;
}

message CashSettleCapacityInstrumentRequest {
  string idempotency_key = 1;
  openagents.common.v1.TraceContext trace = 2;
  openagents.common.v1.PolicyContext policy = 3;
  string instrument_id = 4;
  int64 settled_at_ms = 5;
  optional string settlement_index_id = 6;
  string metadata_json = 7;
  repeated openagents.common.v1.EvidenceRef evidence = 8;
  openagents.economy.v1.ReceiptHints hints = 9;
}

message CashSettleCapacityInstrumentResponse {
  CapacityInstrument instrument = 1;
  string settlement_index_id = 2;
  optional openagents.common.v1.Money settlement_price = 3;
  optional openagents.common.v1.Money cash_flow = 4;
  optional string payer_id = 5;
  optional string payee_id = 6;
  optional openagents.common.v1.Money collateral_consumed = 7;
  optional openagents.common.v1.Money collateral_shortfall = 8;
  openagents.economy.v1.Receipt receipt = 9;
}

message CreateStructuredCapacityInstrumentRequest {
  string idempotency_key = 1;
  openagents.common.v1.TraceContext trace = 2;
  openagents.common.v1.PolicyContext policy = 3;
  StructuredCapacityInstrument structured_instrument = 4;
  repeated openagents.common.v1.EvidenceRef evidence = 5;
  openagents.economy.v1.ReceiptHints hints = 6;
}

message CreateStructuredCapacityInstrumentResponse {
  StructuredCapacityInstrument structured_instrument = 1;
  repeated CapacityInstrument legs = 2;
  openagents.economy.v1.Receipt receipt = 3;
}

message ListStructuredCapacityInstrumentsRequest {
  optional string product_id = 1;
  StructuredCapacityInstrumentStatus status = 2;
}

message ListStructuredCapacityInstrumentsResponse {
  repeated StructuredCapacityInstrument structured_instruments = 1;
}

message GetStructuredCapacityInstrumentRequest {
  string structured_instrument_id = 1;
}

message GetStructuredCapacityInstrumentResponse {
  StructuredCapacityInstrument structured_instrument = 1;
}

message CloseStructuredCapacityInstrumentRequest {
  string idempotency_key = 1;
  openagents.common.v1.TraceContext trace = 2;
  openagents.common.v1.PolicyContext policy = 3;
  string structured_instrument_id = 4;
  StructuredCapacityInstrumentStatus status = 5;
  int64 closed_at_ms = 6;
  bool propagate_to_open_legs = 7;
  optional string lifecycle_reason_detail = 8;
  string metadata_json = 9;
  repeated openagents.common.v1.EvidenceRef evidence = 10;
  openagents.economy.v1.ReceiptHints hints = 11;
}

message CloseStructuredCapacityInstrumentResponse {
  StructuredCapacityInstrument structured_instrument = 1;
  repeated CapacityInstrument legs = 2;
  openagents.economy.v1.Receipt receipt = 3;
}
