version: 11

tx:
  ins:
    - ${CAST_CANCEL_ORDER_UTXO}
    - ${CAST_ADDITIONAL_ASSET_UTXO}
    - ${CAST_FUNDING_UTXO}
  outs:
    - ${CAST_ASSET_APP_INDEX}: ${CAST_REPLACEMENT_TOTAL_ASSET_QUANTITY}
      ${CAST_APP_INDEX}:
        maker: ${CAST_REPLACEMENT_MAKER_ADDRESS}
        exec_type:
          partial: {}
        side: ask
        price: [${CAST_REPLACEMENT_PRICE_NUMERATOR}, ${CAST_REPLACEMENT_PRICE_DENOMINATOR}]
        amount: ${CAST_REPLACEMENT_AMOUNT_SATS}
        quantity: ${CAST_REPLACEMENT_TOTAL_ASSET_QUANTITY}
        asset:
          token: ${CAST_ASSET_APP_IDENTITY}
  coins:
    - amount: 300
      dest: ${CAST_REPLACEMENT_SCROLLS_DEST}

app_public_inputs:
  ${CAST_APP_IDENTITY}: ~
  ${CAST_ASSET_APP_IDENTITY}: ~
