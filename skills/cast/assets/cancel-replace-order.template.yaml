version: 9

apps:
  $CAST: ${CAST_APP_IDENTITY}
  $ASSET: ${CAST_ASSET_APP_IDENTITY}

private_inputs:
  $CAST:
    params:
      - fulfill:
          app: ${CAST_APP_IDENTITY}
          fee_config:
            taker_fee: ${CAST_TAKER_FEE_BPS}
            matcher_fee: ${CAST_MATCHER_FEE_BPS}
            fee_address: ${CAST_FEE_ADDRESS}
          min_value: ${CAST_MIN_VALUE_SATS}
      - ${CAST_OPERATOR_SIGNATURE}
    edit_orders:
      cancel:
        ${CAST_CANCEL_INPUT_INDEX}: ${CAST_CANCEL_SIGNATURE_HEX}

ins:
  - utxo_id: ${CAST_CANCEL_ORDER_UTXO}
    charms:
      $ASSET: ${CAST_CANCEL_ORDER_ASSET_QUANTITY}
      $CAST:
        maker: ${CAST_EXISTING_ORDER_MAKER_ADDRESS}
        exec_type: ${CAST_EXISTING_EXEC_TYPE}
        side: ask
        price: [${CAST_EXISTING_PRICE_NUMERATOR}, ${CAST_EXISTING_PRICE_DENOMINATOR}]
        amount: ${CAST_EXISTING_ORDER_AMOUNT_SATS}
        quantity: ${CAST_CANCEL_ORDER_ASSET_QUANTITY}
        asset:
          token: ${CAST_ASSET_APP_IDENTITY}
  - utxo_id: ${CAST_ADDITIONAL_ASSET_UTXO}
    charms:
      $ASSET: ${CAST_ADDITIONAL_ASSET_QUANTITY}

outs:
  - address: ${CAST_REPLACEMENT_SCROLLS_ADDRESS}
    coin: 300
    charms:
      $ASSET: ${CAST_REPLACEMENT_TOTAL_ASSET_QUANTITY}
      $CAST:
        maker: ${CAST_REPLACEMENT_MAKER_ADDRESS}
        exec_type:
          partial: {}
        side: ask
        price: [${CAST_REPLACEMENT_PRICE_NUMERATOR}, ${CAST_REPLACEMENT_PRICE_DENOMINATOR}]
        amount: ${CAST_REPLACEMENT_AMOUNT_SATS}
        quantity: ${CAST_REPLACEMENT_TOTAL_ASSET_QUANTITY}
        asset:
          token: ${CAST_ASSET_APP_IDENTITY}
