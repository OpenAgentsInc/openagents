version: 11

tx:
  ins:
    - ${CAST_MAKER_ASSET_UTXO}
    - ${CAST_FUNDING_UTXO}
  outs:
    - ${CAST_ASSET_APP_INDEX}: ${CAST_ORDER_ASSET_QUANTITY}
      ${CAST_APP_INDEX}:
        maker: ${CAST_MAKER_BTC_ADDRESS}
        exec_type: all_or_none
        side: ask
        price: [${CAST_PRICE_NUMERATOR}, ${CAST_PRICE_DENOMINATOR}]
        amount: ${CAST_ORDER_AMOUNT_SATS}
        quantity: ${CAST_ORDER_ASSET_QUANTITY}
        asset:
          token: ${CAST_ASSET_APP_IDENTITY}
  coins:
    - amount: 300
      dest: ${CAST_ORDER_SCROLLS_DEST}

app_public_inputs:
  ${CAST_APP_IDENTITY}: ~
  ${CAST_ASSET_APP_IDENTITY}: ~
