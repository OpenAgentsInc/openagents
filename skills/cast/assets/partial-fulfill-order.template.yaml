version: 11

tx:
  ins:
    - ${CAST_ORDER_UTXO}
    - ${CAST_TAKER_FUNDING_UTXO}
  outs:
    - ${CAST_ASSET_APP_INDEX}: ${CAST_FILL_ASSET_QUANTITY}
    - ${CAST_ASSET_APP_INDEX}: ${CAST_REMAINDER_ASSET_QUANTITY}
      ${CAST_APP_INDEX}:
        maker: ${CAST_ORDER_MAKER_ADDRESS}
        exec_type:
          partial:
            from: ${CAST_ORDER_UTXO}
        side: ask
        price: [${CAST_PRICE_NUMERATOR}, ${CAST_PRICE_DENOMINATOR}]
        amount: ${CAST_REMAINDER_AMOUNT_SATS}
        quantity: ${CAST_REMAINDER_ASSET_QUANTITY}
        asset:
          token: ${CAST_ASSET_APP_IDENTITY}
    - {}
    - {}
  coins:
    - amount: 300
      dest: ${CAST_TAKER_RECEIVE_DEST}
    - amount: 300
      dest: ${CAST_ORDER_SCROLLS_DEST}
    - amount: ${CAST_MAKER_PAYOUT_COIN}
      dest: ${CAST_ORDER_MAKER_DEST}
    - amount: ${CAST_TOTAL_FEE_COIN}
      dest: ${CAST_FEE_DEST}

app_public_inputs:
  ${CAST_APP_IDENTITY}: ~
  ${CAST_ASSET_APP_IDENTITY}: ~
